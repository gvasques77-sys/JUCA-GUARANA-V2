<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GV AUTOMACOES - Metricas (Sprint 0)</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --accent: #6366F1;
      --accent-hover: #4F46E5;
      --bg-base: #070A0F;
      --bg-card: rgba(255,255,255,0.04);
      --bg-card-hover: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.08);
      --text-primary: #E8EAF0;
      --text-secondary: #9CA3AF;
      --success: #10B981;
      --danger: #EF4444;
      --warning: #F59E0B;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
    }
    .container { max-width: 1280px; margin: 0 auto; padding: 32px 24px; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
    .header h1 { font-size: 22px; font-weight: 700; }
    .header .sub { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
    .back-link { color: var(--accent); text-decoration: none; font-size: 13px; }
    .back-link:hover { text-decoration: underline; }
    .filters { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
    .filter-select {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
    }
    .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
    .kpi-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
    }
    .kpi-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1.2px; }
    .kpi-value { font-size: 28px; font-weight: 700; margin-top: 6px; }
    .kpi-sub { font-size: 12px; color: var(--text-secondary); margin-top: 6px; }
    .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }
    .chart-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
    }
    .chart-card.full { grid-column: 1 / -1; }
    .chart-title { font-size: 13px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 12px; }
    .chart-wrap { position: relative; height: 260px; }
    .empty { font-size: 13px; color: var(--text-secondary); text-align: center; padding: 40px 0; }
    .loading { font-size: 13px; color: var(--text-secondary); text-align: center; padding: 40px 0; }
    .error-box { background: rgba(239,68,68,0.1); border: 1px solid var(--danger); color: var(--danger); border-radius: 8px; padding: 12px 16px; font-size: 13px; margin-bottom: 16px; }
    @media (max-width: 860px) {
      .kpi-grid { grid-template-columns: 1fr; }
      .chart-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
var h = React.createElement;
var useState = React.useState;
var useEffect = React.useEffect;
var useRef = React.useRef;

// ─── Auth ──────────────────────────────────────────────────────
function getToken() { return localStorage.getItem('gv_admin_token'); }
function clearAuth() {
  localStorage.removeItem('gv_admin_token');
  localStorage.removeItem('gv_admin_user');
}

function q(path) {
  var token = getToken();
  var headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  return fetch(path, { headers: headers }).then(function(res) {
    if (res.status === 401) {
      clearAuth();
      window.location.href = '/admin/login.html';
      return Promise.reject(new Error('Unauthorized'));
    }
    return res.json();
  });
}

// ─── Chart helper ─────────────────────────────────────────────
function useChart(chartRef, buildConfig, deps) {
  useEffect(function() {
    if (!chartRef.current) return;
    var cfg = buildConfig();
    if (!cfg) return;
    var chart = new window.Chart(chartRef.current.getContext('2d'), cfg);
    return function() { chart.destroy(); };
  }, deps);
}

// ─── KPI Card ─────────────────────────────────────────────────
function KpiCard(props) {
  return h('div', { className: 'kpi-card' },
    h('div', { className: 'kpi-label' }, props.label),
    h('div', { className: 'kpi-value' }, props.value),
    props.sub ? h('div', { className: 'kpi-sub' }, props.sub) : null
  );
}

// ─── Chart components ─────────────────────────────────────────
function CostChart(props) {
  var ref = useRef(null);
  useChart(ref, function() {
    var labels = (props.data || []).map(function(d) { return d.day; });
    var values = (props.data || []).map(function(d) { return Number(d.total_usd.toFixed(4)); });
    return {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'Custo USD',
          data: values,
          backgroundColor: 'rgba(99,102,241,0.6)',
          borderColor: '#6366F1',
          borderWidth: 1,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { ticks: { color: '#9CA3AF' }, grid: { color: 'rgba(255,255,255,0.05)' } },
          x: { ticks: { color: '#9CA3AF' }, grid: { display: false } },
        },
      },
    };
  }, [props.data]);

  if (!props.data || props.data.length === 0) {
    return h('div', { className: 'empty' }, 'Sem dados no periodo.');
  }
  return h('div', { className: 'chart-wrap' }, h('canvas', { ref: ref }));
}

function LatencyChart(props) {
  var ref = useRef(null);
  useChart(ref, function() {
    var labels = (props.data || []).map(function(d) { return d.day; });
    var p50 = (props.data || []).map(function(d) { return d.p50_ms; });
    var p95 = (props.data || []).map(function(d) { return d.p95_ms; });
    return {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          { label: 'p50 (ms)', data: p50, borderColor: '#10B981', backgroundColor: 'rgba(16,185,129,0.15)', tension: 0.3 },
          { label: 'p95 (ms)', data: p95, borderColor: '#F59E0B', backgroundColor: 'rgba(245,158,11,0.15)', tension: 0.3 },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#E8EAF0' } } },
        scales: {
          y: { ticks: { color: '#9CA3AF' }, grid: { color: 'rgba(255,255,255,0.05)' } },
          x: { ticks: { color: '#9CA3AF' }, grid: { display: false } },
        },
      },
    };
  }, [props.data]);

  if (!props.data || props.data.length === 0) {
    return h('div', { className: 'empty' }, 'Sem dados de latencia ainda.');
  }
  return h('div', { className: 'chart-wrap' }, h('canvas', { ref: ref }));
}

function VolumeByClinicChart(props) {
  var ref = useRef(null);
  useChart(ref, function() {
    var labels = (props.data || []).map(function(c) { return c.clinic_name; });
    var values = (props.data || []).map(function(c) { return c.total; });
    return {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'Mensagens',
          data: values,
          backgroundColor: 'rgba(16,185,129,0.6)',
          borderColor: '#10B981',
          borderWidth: 1,
        }],
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { ticks: { color: '#9CA3AF' }, grid: { display: false } },
          x: { ticks: { color: '#9CA3AF' }, grid: { color: 'rgba(255,255,255,0.05)' } },
        },
      },
    };
  }, [props.data]);

  if (!props.data || props.data.length === 0) {
    return h('div', { className: 'empty' }, 'Sem volume no periodo.');
  }
  return h('div', { className: 'chart-wrap' }, h('canvas', { ref: ref }));
}

// ─── App Root ─────────────────────────────────────────────────
function App() {
  if (!getToken()) {
    window.location.href = '/admin/login.html';
    return null;
  }

  var periodState = useState('7d');
  var period = periodState[0];
  var setPeriod = periodState[1];

  var clinicState = useState('');
  var clinicId = clinicState[0];
  var setClinicId = clinicState[1];

  var clinicsState = useState([]);
  var clinics = clinicsState[0];
  var setClinics = clinicsState[1];

  var loadingState = useState(true);
  var loading = loadingState[0];
  var setLoading = loadingState[1];

  var errorState = useState(null);
  var error = errorState[0];
  var setError = errorState[1];

  var dataState = useState(null);
  var data = dataState[0];
  var setData = dataState[1];

  useEffect(function() {
    q('/api/admin/metrics/clinics')
      .then(function(r) { setClinics(r.clinics || []); })
      .catch(function() { /* ignore — dropdown apenas */ });
  }, []);

  useEffect(function() {
    setLoading(true);
    setError(null);
    var qs = '?period=' + encodeURIComponent(period) + (clinicId ? '&clinic_id=' + encodeURIComponent(clinicId) : '');
    Promise.all([
      q('/api/admin/metrics/openai-cost' + qs),
      q('/api/admin/metrics/lara-latency' + qs),
      q('/api/admin/metrics/messages-volume' + qs),
    ])
      .then(function(res) {
        setData({ cost: res[0], latency: res[1], volume: res[2] });
        setLoading(false);
      })
      .catch(function(err) {
        setError(err.message || 'Erro ao carregar metricas');
        setLoading(false);
      });
  }, [period, clinicId]);

  var costTotal = data && data.cost ? data.cost.total_usd : 0;
  var costCalls = data && data.cost ? data.cost.total_calls : 0;
  var latencyAvg = data && data.latency ? data.latency.avg_ms : 0;
  var latencyP95 = data && data.latency ? data.latency.p95_ms : 0;
  var volumeTotal = data && data.volume ? data.volume.total : 0;

  return h('div', { className: 'container' },
    h('div', { className: 'header' },
      h('div', null,
        h('h1', null, 'Metricas CLINICORE'),
        h('div', { className: 'sub' }, 'Sprint 0 - Baseline de observabilidade (custo, latencia, volume)'),
        h('a', { className: 'back-link', href: '/admin/index.html' }, '< Voltar ao backoffice')
      )
    ),

    h('div', { className: 'filters' },
      h('select', {
        className: 'filter-select',
        value: period,
        onChange: function(e) { setPeriod(e.target.value); }
      },
        h('option', { value: '1d' }, 'Ultimas 24h'),
        h('option', { value: '7d' }, 'Ultimos 7 dias'),
        h('option', { value: '30d' }, 'Ultimos 30 dias')
      ),
      h('select', {
        className: 'filter-select',
        value: clinicId,
        onChange: function(e) { setClinicId(e.target.value); }
      },
        h('option', { value: '' }, 'Todas as clinicas'),
        clinics.map(function(c) { return h('option', { key: c.id, value: c.id }, c.name || c.id); })
      )
    ),

    error ? h('div', { className: 'error-box' }, 'Erro: ' + error) : null,
    loading ? h('div', { className: 'loading' }, 'Carregando metricas...') : null,

    !loading && data ? h('div', null,
      h('div', { className: 'kpi-grid' },
        h(KpiCard, {
          label: 'Custo OpenAI',
          value: '$' + costTotal.toFixed(4),
          sub: costCalls + ' chamadas no periodo'
        }),
        h(KpiCard, {
          label: 'Latencia media Lara',
          value: latencyAvg + ' ms',
          sub: 'p95: ' + latencyP95 + ' ms'
        }),
        h(KpiCard, {
          label: 'Mensagens Lara',
          value: String(volumeTotal),
          sub: (data.volume.by_clinic || []).length + ' clinicas ativas'
        })
      ),
      h('div', { className: 'chart-grid' },
        h('div', { className: 'chart-card' },
          h('div', { className: 'chart-title' }, 'Custo OpenAI por dia (USD)'),
          h(CostChart, { data: data.cost.by_day })
        ),
        h('div', { className: 'chart-card' },
          h('div', { className: 'chart-title' }, 'Latencia Lara por dia (p50/p95)'),
          h(LatencyChart, { data: data.latency.by_day })
        ),
        h('div', { className: 'chart-card full' },
          h('div', { className: 'chart-title' }, 'Volume de mensagens por clinica'),
          h(VolumeByClinicChart, { data: data.volume.by_clinic })
        )
      )
    ) : null
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
