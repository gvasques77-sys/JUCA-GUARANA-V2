<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel | Secretária Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- LOGIN -->
    <div id="loginModal" class="fixed inset-0 bg-gradient-to-br from-indigo-600 to-purple-700 flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl fade-in">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-indigo-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="calendar-heart" class="w-8 h-8 text-indigo-600"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-900">Secretária Inteligente</h1>
                <p class="text-gray-500 mt-1">Painel da Recepção</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Senha</label>
                    <input type="password" id="loginPassword"
                           class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-indigo-500"
                           placeholder="••••••••"
                           onkeypress="if(event.key==='Enter') doLogin()">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Clinic ID <span class="text-gray-400 text-xs font-normal">(preenchido automaticamente)</span></label>
                    <input type="text" id="loginClinicId"
                           class="w-full px-4 py-3 border rounded-xl focus:ring-2 focus:ring-indigo-500 font-mono text-sm"
                           placeholder="UUID da clínica"
                           onkeypress="if(event.key==='Enter') doLogin()">
                </div>
                <button onclick="doLogin()" class="w-full py-3 bg-indigo-600 text-white rounded-xl font-semibold hover:bg-indigo-700">
                    Entrar
                </button>
                <p id="loginError" class="text-red-500 text-sm text-center hidden">Senha ou Clinic ID incorretos</p>
            </div>
        </div>
    </div>

    <!-- MAIN -->
    <div id="mainContent" class="hidden">
        <!-- Header -->
        <header class="bg-white border-b sticky top-0 z-20">
            <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-indigo-100 rounded-xl flex items-center justify-center">
                        <i data-lucide="calendar-heart" class="w-6 h-6 text-indigo-600"></i>
                    </div>
                    <span class="text-xl font-bold text-gray-900">Secretária Inteligente</span>
                </div>
                <div class="flex items-center gap-4">
                    <span class="text-sm text-gray-500" id="currentDate"></span>
                    <button onclick="loadAllData()" class="p-2 hover:bg-gray-100 rounded-lg" title="Atualizar">
                        <i data-lucide="refresh-cw" class="w-5 h-5 text-gray-500"></i>
                    </button>
                    <button onclick="openModal('newAppointmentModal')" class="px-4 py-2 bg-indigo-600 text-white rounded-xl font-medium hover:bg-indigo-700 flex items-center gap-2">
                        <i data-lucide="plus" class="w-5 h-5"></i>
                        <span class="hidden sm:inline">Novo</span>
                    </button>
                    <button onclick="logout()" class="p-2 hover:bg-gray-100 rounded-lg" title="Sair">
                        <i data-lucide="log-out" class="w-5 h-5 text-gray-500"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 py-8">
            <!-- Stats -->
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                <div class="bg-white rounded-2xl p-6 border">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center">
                            <i data-lucide="calendar-check" class="w-6 h-6 text-blue-600"></i>
                        </div>
                        <div>
                            <p class="text-3xl font-bold" id="statToday">-</p>
                            <p class="text-sm text-gray-500">Hoje</p>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-2xl p-6 border">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-yellow-100 rounded-xl flex items-center justify-center">
                            <i data-lucide="clock" class="w-6 h-6 text-yellow-600"></i>
                        </div>
                        <div>
                            <p class="text-3xl font-bold" id="statPending">-</p>
                            <p class="text-sm text-gray-500">Pendentes</p>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-2xl p-6 border">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-green-100 rounded-xl flex items-center justify-center">
                            <i data-lucide="calendar-days" class="w-6 h-6 text-green-600"></i>
                        </div>
                        <div>
                            <p class="text-3xl font-bold" id="statWeek">-</p>
                            <p class="text-sm text-gray-500">Semana</p>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-2xl p-6 border">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-purple-100 rounded-xl flex items-center justify-center">
                            <i data-lucide="users" class="w-6 h-6 text-purple-600"></i>
                        </div>
                        <div>
                            <p class="text-3xl font-bold" id="statPatients">-</p>
                            <p class="text-sm text-gray-500">Pacientes</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Filters -->
            <div class="bg-white rounded-2xl p-4 border mb-6">
                <div class="flex flex-wrap items-end gap-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">Data</label>
                        <input type="date" id="filterDate" onchange="loadAppointments()"
                               class="px-4 py-2 border rounded-xl focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">Médico</label>
                        <select id="filterDoctor" onchange="loadAppointments()"
                                class="px-4 py-2 border rounded-xl focus:ring-2 focus:ring-indigo-500 min-w-[180px]">
                            <option value="">Todos</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">Status</label>
                        <select id="filterStatus" onchange="loadAppointments()"
                                class="px-4 py-2 border rounded-xl focus:ring-2 focus:ring-indigo-500">
                            <option value="">Todos</option>
                            <option value="scheduled">Agendado</option>
                            <option value="confirmed">Confirmado</option>
                            <option value="waiting">Aguardando</option>
                            <option value="in_progress">Em Atendimento</option>
                            <option value="completed">Finalizado</option>
                            <option value="cancelled">Cancelado</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Table -->
            <div class="bg-white rounded-2xl border overflow-hidden">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Horário</th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Paciente</th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Médico</th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Serviço</th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Status</th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-gray-500 uppercase">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="appointmentsTable" class="divide-y"></tbody>
                </table>
                <div id="emptyState" class="hidden py-12 text-center">
                    <i data-lucide="inbox" class="w-12 h-12 text-gray-300 mx-auto mb-4"></i>
                    <p class="text-gray-500">Nenhum agendamento</p>
                </div>
                <div id="loadingState" class="hidden py-12 text-center">
                    <div class="w-8 h-8 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL: Novo Agendamento -->
    <div id="newAppointmentModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-2xl w-full max-w-lg mx-4 shadow-2xl max-h-[90vh] overflow-y-auto">
            <div class="sticky top-0 bg-white px-6 py-4 border-b flex items-center justify-between">
                <h2 class="text-xl font-bold">Novo Agendamento</h2>
                <button onclick="closeModal('newAppointmentModal')" class="p-2 hover:bg-gray-100 rounded-lg">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <form id="newAppointmentForm" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Telefone *</label>
                    <input type="tel" name="patient_phone" required
                           class="w-full px-4 py-3 border rounded-xl" placeholder="11999999999">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nome *</label>
                    <input type="text" name="patient_name" required
                           class="w-full px-4 py-3 border rounded-xl" placeholder="Nome completo">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Médico *</label>
                    <select name="doctor_id" required id="modalDoctorSelect" class="w-full px-4 py-3 border rounded-xl">
                        <option value="">Selecione...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Serviço *</label>
                    <select name="service_id" required id="modalServiceSelect" class="w-full px-4 py-3 border rounded-xl">
                        <option value="">Selecione...</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Data *</label>
                        <input type="date" name="appointment_date" required class="w-full px-4 py-3 border rounded-xl">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Horário *</label>
                        <input type="time" name="start_time" required class="w-full px-4 py-3 border rounded-xl">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Observações</label>
                    <textarea name="notes" rows="2" class="w-full px-4 py-3 border rounded-xl resize-none"></textarea>
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeModal('newAppointmentModal')"
                            class="flex-1 py-3 border rounded-xl font-medium hover:bg-gray-50">Cancelar</button>
                    <button type="submit" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-medium hover:bg-indigo-700">Agendar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-4 right-4 bg-gray-900 text-white px-6 py-4 rounded-xl shadow-lg hidden z-50">
        <span id="toastMessage"></span>
    </div>

    <script>
        const API_BASE = window.location.origin + '/admin';
        let AUTH_TOKEN = '';
        let CLINIC_ID = '';
        let doctors = [];
        let services = [];

        const STATUS = {
            'scheduled': { label: 'Agendado', bg: 'bg-blue-100', text: 'text-blue-700' },
            'confirmed': { label: 'Confirmado', bg: 'bg-green-100', text: 'text-green-700' },
            'waiting': { label: 'Aguardando', bg: 'bg-yellow-100', text: 'text-yellow-700' },
            'in_progress': { label: 'Em Atendimento', bg: 'bg-purple-100', text: 'text-purple-700' },
            'completed': { label: 'Finalizado', bg: 'bg-gray-100', text: 'text-gray-600' },
            'cancelled': { label: 'Cancelado', bg: 'bg-red-100', text: 'text-red-700' },
            'no_show': { label: 'Faltou', bg: 'bg-orange-100', text: 'text-orange-700' }
        };

        // Busca o clinic_id padrão configurado no servidor
        async function fetchClinicInfo() {
            try {
                const res = await fetch(`${API_BASE}/api/clinic-info`);
                if (res.ok) {
                    const data = await res.json();
                    if (data.clinic_id) {
                        CLINIC_ID = data.clinic_id;
                        const el = document.getElementById('loginClinicId');
                        if (el && !el.value) el.value = CLINIC_ID;
                    }
                }
            } catch (e) { /* silencioso */ }
        }

        // Auth
        function doLogin() {
            AUTH_TOKEN = document.getElementById('loginPassword').value;
            CLINIC_ID = document.getElementById('loginClinicId').value.trim() || CLINIC_ID;
            fetch(`${API_BASE}/api/dashboard`, {
                headers: {
                    'Authorization': `Bearer ${AUTH_TOKEN}`,
                    'x-clinic-id': CLINIC_ID
                }
            })
            .then(res => {
                if (res.ok) {
                    localStorage.setItem('token', AUTH_TOKEN);
                    localStorage.setItem('clinic_id', CLINIC_ID);
                    document.getElementById('loginModal').classList.add('hidden');
                    document.getElementById('mainContent').classList.remove('hidden');
                    init();
                } else {
                    document.getElementById('loginError').classList.remove('hidden');
                }
            });
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('clinic_id');
            location.reload();
        }

        function checkAuth() {
            const t = localStorage.getItem('token');
            const c = localStorage.getItem('clinic_id');
            if (t && c) {
                AUTH_TOKEN = t;
                CLINIC_ID = c;
                document.getElementById('loginModal').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                init();
            }
        }

        // Init
        function init() {
            lucide.createIcons();
            document.getElementById('currentDate').textContent = new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
            document.getElementById('filterDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('newAppointmentForm').addEventListener('submit', handleNewAppointment);
            loadAllData();
        }

        async function loadAllData() {
            await Promise.all([loadDashboard(), loadDoctors(), loadServices(), loadAppointments()]);
        }

        async function api(endpoint, options = {}) {
            const res = await fetch(`${API_BASE}${endpoint}`, {
                ...options,
                headers: {
                    'Authorization': `Bearer ${AUTH_TOKEN}`,
                    'x-clinic-id': CLINIC_ID,
                    'Content-Type': 'application/json',
                    ...options.headers
                }
            });
            if (res.status === 401) { logout(); return null; }
            return res.json();
        }

        async function loadDashboard() {
            const data = await api('/api/dashboard');
            if (data?.success) {
                document.getElementById('statToday').textContent = data.data.today.total || 0;
                document.getElementById('statPending').textContent = data.data.stats.pendingConfirmation || 0;
                document.getElementById('statWeek').textContent = data.data.stats.weekTotal || 0;
            }
        }

        async function loadDoctors() {
            const data = await api('/api/doctors');
            if (data?.success) {
                doctors = data.data;
                ['filterDoctor', 'modalDoctorSelect'].forEach(id => {
                    const el = document.getElementById(id);
                    el.innerHTML = '<option value="">Todos</option>' + doctors.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
                });
            }
        }

        async function loadServices() {
            const data = await api('/api/services');
            if (data?.success) {
                services = data.data;
                document.getElementById('modalServiceSelect').innerHTML = '<option value="">Selecione...</option>' + services.map(s => `<option value="${s.id}">${s.name} - R$ ${s.price}</option>`).join('');
            }
        }

        async function loadPatients() {
            const data = await api('/api/patients');
            if (data?.success) document.getElementById('statPatients').textContent = data.data.length;
        }

        async function loadAppointments() {
            const date = document.getElementById('filterDate').value;
            const doctor = document.getElementById('filterDoctor').value;
            const status = document.getElementById('filterStatus').value;
            
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('appointmentsTable').innerHTML = '';
            document.getElementById('emptyState').classList.add('hidden');
            
            let url = '/api/appointments?';
            if (date) url += `date=${date}&`;
            if (doctor) url += `doctor_id=${doctor}&`;
            if (status) url += `status=${status}&`;
            
            const data = await api(url);
            document.getElementById('loadingState').classList.add('hidden');
            
            if (data?.success && data.data.length > 0) {
                renderTable(data.data);
            } else {
                document.getElementById('emptyState').classList.remove('hidden');
            }
        }

        function renderTable(appointments) {
            const tbody = document.getElementById('appointmentsTable');
            tbody.innerHTML = appointments.map(apt => {
                const s = STATUS[apt.status] || STATUS.scheduled;
                return `
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4">
                            <p class="font-medium">${apt.start_time?.substring(0,5) || '-'}</p>
                            <p class="text-xs text-gray-500">${formatDate(apt.appointment_date)}</p>
                        </td>
                        <td class="px-6 py-4">
                            <p class="font-medium">${apt.patients?.name || '-'}</p>
                            <p class="text-sm text-gray-500">${formatPhone(apt.patients?.phone)}</p>
                        </td>
                        <td class="px-6 py-4">
                            <p>${apt.doctors?.name || '-'}</p>
                        </td>
                        <td class="px-6 py-4">
                            <p>${apt.services?.name || '-'}</p>
                            <p class="text-xs text-gray-500">R$ ${apt.price || 0}</p>
                        </td>
                        <td class="px-6 py-4">
                            <span class="px-3 py-1 text-xs font-medium rounded-full ${s.bg} ${s.text}">${s.label}</span>
                        </td>
                        <td class="px-6 py-4">
                            <div class="flex gap-1">
                                ${apt.status === 'scheduled' ? `<button onclick="updateStatus('${apt.id}', 'confirmed')" class="p-2 text-green-600 hover:bg-green-50 rounded-lg" title="Confirmar"><i data-lucide="check" class="w-4 h-4"></i></button>` : ''}
                                ${apt.status === 'confirmed' ? `<button onclick="updateStatus('${apt.id}', 'waiting')" class="p-2 text-yellow-600 hover:bg-yellow-50 rounded-lg" title="Chegou"><i data-lucide="user-check" class="w-4 h-4"></i></button>` : ''}
                                ${apt.status === 'waiting' ? `<button onclick="updateStatus('${apt.id}', 'in_progress')" class="p-2 text-purple-600 hover:bg-purple-50 rounded-lg" title="Iniciar"><i data-lucide="play" class="w-4 h-4"></i></button>` : ''}
                                ${apt.status === 'in_progress' ? `<button onclick="updateStatus('${apt.id}', 'completed')" class="p-2 text-gray-600 hover:bg-gray-100 rounded-lg" title="Finalizar"><i data-lucide="check-circle" class="w-4 h-4"></i></button>` : ''}
                                ${['scheduled','confirmed'].includes(apt.status) ? `<button onclick="cancelApt('${apt.id}')" class="p-2 text-red-600 hover:bg-red-50 rounded-lg" title="Cancelar"><i data-lucide="x" class="w-4 h-4"></i></button>` : ''}
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
            lucide.createIcons();
        }

        async function updateStatus(id, status) {
            await api(`/api/appointments/${id}`, { method: 'PATCH', body: JSON.stringify({ status }) });
            showToast('Atualizado!');
            loadAllData();
        }

        async function cancelApt(id) {
            if (!confirm('Cancelar este agendamento?')) return;
            await api(`/api/appointments/${id}`, { method: 'DELETE' });
            showToast('Cancelado');
            loadAllData();
        }

        async function handleNewAppointment(e) {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(e.target).entries());
            const result = await api('/api/appointments', { method: 'POST', body: JSON.stringify(data) });
            if (result?.success) {
                showToast('Agendamento criado!');
                closeModal('newAppointmentModal');
                e.target.reset();
                loadAllData();
            } else {
                showToast(result?.error || 'Erro');
            }
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); lucide.createIcons(); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        
        function formatDate(d) { return d ? new Date(d + 'T00:00:00').toLocaleDateString('pt-BR') : '-'; }
        function formatPhone(p) {
            if (!p) return '-';
            const c = p.replace(/\D/g, '');
            return c.length === 11 ? `(${c.slice(0,2)}) ${c.slice(2,7)}-${c.slice(7)}` : p;
        }
        
        function showToast(msg) {
            document.getElementById('toastMessage').textContent = msg;
            document.getElementById('toast').classList.remove('hidden');
            setTimeout(() => document.getElementById('toast').classList.add('hidden'), 3000);
        }

        document.addEventListener('DOMContentLoaded', () => { lucide.createIcons(); fetchClinicInfo().then(() => checkAuth()); });
    </script>
</body>
</html>
