<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GV AUTOMACOES - Backoffice</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --accent: #6366F1;
      --accent-hover: #4F46E5;
      --bg-base: #070A0F;
      --bg-card: rgba(255,255,255,0.04);
      --bg-card-hover: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.08);
      --text-primary: #E8EAF0;
      --text-secondary: #9CA3AF;
      --success: #10B981;
      --danger: #EF4444;
      --warning: #F59E0B;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
    }
    #root { display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 240px;
      min-height: 100vh;
      background: rgba(255,255,255,0.02);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 0;
      flex-shrink: 0;
    }
    .sidebar-logo {
      padding: 0 20px 24px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo .brand { font-size: 11px; color: #6B7280; letter-spacing: 2px; text-transform: uppercase; }
    .sidebar-logo .title { font-size: 16px; font-weight: 700; margin-top: 4px; }
    .sidebar-nav { flex: 1; padding: 16px 12px; }
    .nav-section { font-size: 10px; color: #4B5563; text-transform: uppercase; letter-spacing: 1.5px; padding: 8px 8px 4px; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
      margin-bottom: 2px;
      transition: background 0.15s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }
    .nav-item:hover { background: var(--bg-card-hover); color: var(--text-primary); }
    .nav-item.active { background: rgba(99,102,241,0.15); color: var(--accent); }
    .nav-item .icon { font-size: 16px; width: 18px; text-align: center; }
    .nav-item .badge {
      margin-left: auto;
      background: var(--danger);
      color: white;
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 10px;
    }
    .nav-item .soon {
      margin-left: auto;
      font-size: 10px;
      color: #4B5563;
      background: rgba(255,255,255,0.04);
      padding: 1px 6px;
      border-radius: 4px;
    }
    .sidebar-footer {
      padding: 16px 12px;
      border-top: 1px solid var(--border);
    }
    .admin-info {
      padding: 8px 12px;
      border-radius: 8px;
      background: var(--bg-card);
      margin-bottom: 8px;
    }
    .admin-info .admin-name { font-size: 13px; font-weight: 600; }
    .admin-info .admin-role { font-size: 11px; color: var(--text-secondary); text-transform: capitalize; }
    .btn-logout {
      width: 100%;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      text-align: left;
    }
    .btn-logout:hover { background: rgba(239,68,68,0.08); color: var(--danger); border-color: rgba(239,68,68,0.3); }

    /* Main */
    .main { flex: 1; display: flex; flex-direction: column; overflow: auto; }
    .topbar {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar h1 { font-size: 20px; font-weight: 700; }
    .topbar .sub { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
    .content { padding: 32px; }

    /* KPI Cards */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .kpi-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .kpi-label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
    .kpi-value { font-size: 32px; font-weight: 700; margin: 8px 0 4px; }
    .kpi-sub { font-size: 12px; color: var(--text-secondary); }
    .kpi-card.danger { border-color: rgba(239,68,68,0.3); }
    .kpi-card.danger .kpi-value { color: var(--danger); }
    .kpi-card.success .kpi-value { color: var(--success); }
    .kpi-card.accent .kpi-value { color: var(--accent); }

    /* Section */
    .section-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }

    /* Table */
    .table-wrap {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .table-toolbar {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .search-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      color: var(--text-primary);
      font-size: 13px;
      outline: none;
      max-width: 320px;
    }
    .search-input:focus { border-color: rgba(99,102,241,0.5); }
    .filter-btn {
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
    }
    .filter-btn.active { background: rgba(99,102,241,0.15); color: var(--accent); border-color: rgba(99,102,241,0.4); }
    table { width: 100%; border-collapse: collapse; }
    th {
      padding: 12px 20px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid var(--border);
    }
    td { padding: 14px 20px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .clinic-name { font-weight: 600; }
    .clinic-email { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .badge-active { background: rgba(16,185,129,0.15); color: var(--success); }
    .badge-inactive { background: rgba(239,68,68,0.12); color: var(--danger); }
    .badge-starter { background: rgba(156,163,175,0.15); color: #9CA3AF; }
    .badge-pro { background: rgba(99,102,241,0.15); color: var(--accent); }
    .badge-enterprise { background: rgba(245,158,11,0.15); color: var(--warning); }
    .btn-action {
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text-secondary);
      font-size: 12px;
      cursor: pointer;
    }
    .btn-action:hover { background: var(--bg-card-hover); color: var(--text-primary); }
    .btn-primary {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary:hover { background: var(--accent-hover); }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 24px;
    }
    .modal {
      background: #0D1117;
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 680px;
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal-header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-header h2 { font-size: 18px; font-weight: 700; }
    .modal-close {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
    }
    .modal-close:hover { background: var(--bg-card-hover); color: var(--text-primary); }
    .modal-body { padding: 24px; }
    .modal-section { margin-bottom: 24px; }
    .modal-section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { font-size: 13px; color: var(--text-secondary); }
    .detail-value { font-size: 13px; font-weight: 500; }

    /* Form */
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; display: block; }
    .form-input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 14px;
      color: var(--text-primary);
      font-size: 13px;
      outline: none;
    }
    .form-input:focus { border-color: rgba(99,102,241,0.5); }
    .form-select {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 14px;
      color: var(--text-primary);
      font-size: 13px;
      outline: none;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-footer { padding: 20px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }

    /* Loading */
    .loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: var(--text-secondary); font-size: 14px; }
    .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Empty */
    .empty { padding: 60px; text-align: center; color: var(--text-secondary); font-size: 14px; }

    /* Coming soon */
    .coming-soon {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px;
      text-align: center;
    }
    .coming-soon .icon { font-size: 48px; margin-bottom: 16px; }
    .coming-soon h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .coming-soon p { color: var(--text-secondary); font-size: 14px; }

    /* Alert row */
    .alert-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .alert-row:last-child { border-bottom: none; }
    .alert-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .alert-dot-error { background: var(--danger); }
    .alert-dot-warning { background: var(--warning); }
    .alert-dot-info { background: var(--accent); }
    .alert-title { font-size: 13px; font-weight: 500; }
    .alert-time { font-size: 11px; color: var(--text-secondary); }

    /* User row */
    .user-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 12px;
      margin: 3px;
    }
    .user-role { color: var(--text-secondary); }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
var h = React.createElement;
var useState = React.useState;
var useEffect = React.useEffect;
var useCallback = React.useCallback;

// ─── Auth helpers ──────────────────────────────────────────────
function getToken() { return localStorage.getItem('gv_admin_token'); }
function getUser() {
  var raw = localStorage.getItem('gv_admin_user');
  try { return raw ? JSON.parse(raw) : null; } catch(e) { return null; }
}
function clearAuth() {
  localStorage.removeItem('gv_admin_token');
  localStorage.removeItem('gv_admin_user');
}

function q(path, opts) {
  var token = getToken();
  var headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  return fetch(path, Object.assign({}, opts || {}, { headers: headers }))
    .then(function(res) {
      if (res.status === 401) {
        clearAuth();
        window.location.href = '/admin/login.html';
        return Promise.reject(new Error('Unauthorized'));
      }
      return res.json();
    });
}

function formatDate(iso) {
  if (!iso) return '-';
  return new Date(iso).toLocaleDateString('pt-BR');
}

// ─── KPI Card ─────────────────────────────────────────────────
function KpiCard(props) {
  return h('div', { className: 'kpi-card' + (props.variant ? ' ' + props.variant : '') },
    h('div', { className: 'kpi-label' }, props.label),
    h('div', { className: 'kpi-value' }, props.value),
    props.sub ? h('div', { className: 'kpi-sub' }, props.sub) : null
  );
}

// ─── Loading ──────────────────────────────────────────────────
function Loading() {
  return h('div', { className: 'loading' },
    h('div', { className: 'spinner' }),
    'Carregando...'
  );
}

// ─── Billing Form ─────────────────────────────────────────────
function BillingForm(props) {
  var billing = props.billing || {};
  var state = useState({
    plan: billing.plan || 'starter',
    monthly_fee: billing.monthly_fee || 0,
    billing_day: billing.billing_day || 1,
    price_per_1k_tokens_input: billing.price_per_1k_tokens_input || 0,
    price_per_1k_tokens_output: billing.price_per_1k_tokens_output || 0,
    price_per_template: billing.price_per_template || 0,
    asaas_customer_id: billing.asaas_customer_id || '',
    notes: billing.notes || ''
  });
  var form = state[0];
  var setForm = state[1];
  var saving = useState(false);
  var setSaving = saving[1];
  saving = saving[0];

  function set(field, val) {
    setForm(function(prev) {
      var next = {};
      Object.keys(prev).forEach(function(k) { next[k] = prev[k]; });
      next[field] = val;
      return next;
    });
  }

  function save() {
    setSaving(true);
    q('/api/admin/clinics/' + props.clinicId + '/billing', {
      method: 'PUT',
      body: JSON.stringify(form)
    })
    .then(function(data) {
      setSaving(false);
      if (data.id) { props.onSaved(data); }
    })
    .catch(function() { setSaving(false); });
  }

  return h('div', null,
    h('div', { className: 'form-row' },
      h('div', { className: 'form-group' },
        h('label', { className: 'form-label' }, 'Plano'),
        h('select', {
          className: 'form-select',
          value: form.plan,
          onChange: function(e) { set('plan', e.target.value); }
        },
          h('option', { value: 'starter' }, 'Starter'),
          h('option', { value: 'pro' }, 'Pro'),
          h('option', { value: 'enterprise' }, 'Enterprise')
        )
      ),
      h('div', { className: 'form-group' },
        h('label', { className: 'form-label' }, 'Mensalidade (R$)'),
        h('input', {
          className: 'form-input',
          type: 'number',
          step: '0.01',
          value: form.monthly_fee,
          onChange: function(e) { set('monthly_fee', parseFloat(e.target.value) || 0); }
        })
      )
    ),
    h('div', { className: 'form-row' },
      h('div', { className: 'form-group' },
        h('label', { className: 'form-label' }, 'Preco por 1k tokens entrada'),
        h('input', {
          className: 'form-input',
          type: 'number',
          step: '0.000001',
          value: form.price_per_1k_tokens_input,
          onChange: function(e) { set('price_per_1k_tokens_input', parseFloat(e.target.value) || 0); }
        })
      ),
      h('div', { className: 'form-group' },
        h('label', { className: 'form-label' }, 'Preco por 1k tokens saida'),
        h('input', {
          className: 'form-input',
          type: 'number',
          step: '0.000001',
          value: form.price_per_1k_tokens_output,
          onChange: function(e) { set('price_per_1k_tokens_output', parseFloat(e.target.value) || 0); }
        })
      )
    ),
    h('div', { className: 'form-row' },
      h('div', { className: 'form-group' },
        h('label', { className: 'form-label' }, 'Preco por template'),
        h('input', {
          className: 'form-input',
          type: 'number',
          step: '0.0001',
          value: form.price_per_template,
          onChange: function(e) { set('price_per_template', parseFloat(e.target.value) || 0); }
        })
      ),
      h('div', { className: 'form-group' },
        h('label', { className: 'form-label' }, 'Dia de cobranca (1-28)'),
        h('input', {
          className: 'form-input',
          type: 'number',
          min: '1',
          max: '28',
          value: form.billing_day,
          onChange: function(e) { set('billing_day', parseInt(e.target.value) || 1); }
        })
      )
    ),
    h('div', { className: 'form-group' },
      h('label', { className: 'form-label' }, 'ID Cliente Asaas'),
      h('input', {
        className: 'form-input',
        type: 'text',
        placeholder: 'cus_...',
        value: form.asaas_customer_id,
        onChange: function(e) { set('asaas_customer_id', e.target.value); }
      })
    ),
    h('div', { className: 'form-group' },
      h('label', { className: 'form-label' }, 'Notas internas'),
      h('input', {
        className: 'form-input',
        type: 'text',
        value: form.notes,
        onChange: function(e) { set('notes', e.target.value); }
      })
    ),
    h('div', { style: { textAlign: 'right', marginTop: '8px' } },
      h('button', {
        className: 'btn-primary',
        disabled: saving,
        onClick: save
      }, saving ? 'Salvando...' : 'Salvar Billing')
    )
  );
}

// ─── Clinic Detail Modal ───────────────────────────────────────
function ClinicDetailModal(props) {
  var detail = useState(null);
  var setDetail = detail[1];
  detail = detail[0];
  var loading = useState(true);
  var setLoading = loading[1];
  loading = loading[0];
  var toggling = useState(false);
  var setToggling = toggling[1];
  toggling = toggling[0];

  useEffect(function() {
    setLoading(true);
    q('/api/admin/clinics/' + props.clinic.id)
      .then(function(data) { setDetail(data); setLoading(false); })
      .catch(function() { setLoading(false); });
  }, [props.clinic.id]);

  function toggleStatus() {
    if (!detail) return;
    setToggling(true);
    q('/api/admin/clinics/' + detail.id + '/status', {
      method: 'PATCH',
      body: JSON.stringify({ is_active: !detail.is_active })
    })
    .then(function(data) {
      setDetail(function(prev) {
        var next = {};
        Object.keys(prev).forEach(function(k) { next[k] = prev[k]; });
        next.is_active = data.is_active;
        return next;
      });
      setToggling(false);
      props.onStatusChanged(data);
    })
    .catch(function() { setToggling(false); });
  }

  function onBillingSaved(billing) {
    setDetail(function(prev) {
      var next = {};
      Object.keys(prev).forEach(function(k) { next[k] = prev[k]; });
      next.billing = billing;
      return next;
    });
  }

  return h('div', { className: 'modal-overlay', onClick: function(e) { if (e.target === e.currentTarget) props.onClose(); } },
    h('div', { className: 'modal' },
      h('div', { className: 'modal-header' },
        h('div', null,
          h('h2', null, props.clinic.name),
          h('div', { style: { fontSize: '13px', color: 'var(--text-secondary)', marginTop: '4px' } }, props.clinic.email)
        ),
        h('button', { className: 'modal-close', onClick: props.onClose }, 'x')
      ),
      h('div', { className: 'modal-body' },
        loading ? h(Loading) : !detail ? h('div', { className: 'empty' }, 'Erro ao carregar detalhes.') :
        h('div', null,

          // Status + acao
          h('div', { className: 'modal-section' },
            h('div', { className: 'detail-row' },
              h('span', { className: 'detail-label' }, 'Status'),
              h('div', { style: { display: 'flex', alignItems: 'center', gap: '10px' } },
                h('span', { className: 'badge ' + (detail.is_active ? 'badge-active' : 'badge-inactive') },
                  detail.is_active ? 'Ativa' : 'Inativa'
                ),
                h('button', {
                  className: 'btn-action',
                  disabled: toggling,
                  onClick: toggleStatus,
                  style: { borderColor: detail.is_active ? 'rgba(239,68,68,0.3)' : 'rgba(16,185,129,0.3)', color: detail.is_active ? 'var(--danger)' : 'var(--success)' }
                }, toggling ? '...' : (detail.is_active ? 'Desativar' : 'Ativar'))
              )
            ),
            h('div', { className: 'detail-row' },
              h('span', { className: 'detail-label' }, 'Telefone'),
              h('span', { className: 'detail-value' }, detail.phone || '-')
            ),
            h('div', { className: 'detail-row' },
              h('span', { className: 'detail-label' }, 'Criada em'),
              h('span', { className: 'detail-value' }, formatDate(detail.created_at))
            ),
            h('div', { className: 'detail-row' },
              h('span', { className: 'detail-label' }, 'Total de pacientes'),
              h('span', { className: 'detail-value' }, detail.metrics ? detail.metrics.total_patients : '-')
            )
          ),

          // Usuarios
          h('div', { className: 'modal-section' },
            h('div', { className: 'modal-section-title' }, 'Usuarios (' + ((detail.users && detail.users.length) || 0) + ')'),
            !detail.users || detail.users.length === 0
              ? h('div', { style: { fontSize: '13px', color: 'var(--text-secondary)' } }, 'Nenhum usuario cadastrado.')
              : h('div', null,
                  detail.users.map(function(u, i) {
                    return h('span', { key: i, className: 'user-chip' },
                      h('span', { className: 'user-role' }, u.role)
                    );
                  })
                )
          ),

          // WhatsApp
          h('div', { className: 'modal-section' },
            h('div', { className: 'modal-section-title' }, 'WhatsApp'),
            detail.whatsapp_config
              ? h('div', null,
                  h('div', { className: 'detail-row' },
                    h('span', { className: 'detail-label' }, 'Display Name'),
                    h('span', { className: 'detail-value' }, detail.whatsapp_config.display_name || '-')
                  ),
                  h('div', { className: 'detail-row' },
                    h('span', { className: 'detail-label' }, 'Phone Number ID'),
                    h('span', { className: 'detail-value', style: { fontFamily: 'monospace', fontSize: '12px' } }, detail.whatsapp_config.phone_number_id || '-')
                  )
                )
              : h('div', { style: { fontSize: '13px', color: 'var(--text-secondary)' } }, 'Nao configurado.')
          ),

          // Alertas ativos
          detail.active_alerts && detail.active_alerts.length > 0
            ? h('div', { className: 'modal-section' },
                h('div', { className: 'modal-section-title' }, 'Alertas ativos (' + detail.active_alerts.length + ')'),
                h('div', null,
                  detail.active_alerts.map(function(a, i) {
                    return h('div', { key: i, className: 'alert-row' },
                      h('div', { className: 'alert-dot alert-dot-' + a.alert_type }),
                      h('div', null,
                        h('div', { className: 'alert-title' }, a.title),
                        h('div', { className: 'alert-time' }, formatDate(a.created_at))
                      )
                    );
                  })
                )
              )
            : null,

          // Billing config
          h('div', { className: 'modal-section' },
            h('div', { className: 'modal-section-title' }, 'Configuracao de Billing'),
            h(BillingForm, { clinicId: detail.id, billing: detail.billing, onSaved: onBillingSaved })
          )
        )
      )
    )
  );
}

// ─── Dashboard Page ────────────────────────────────────────────
function DashboardPage() {
  var overview = useState(null);
  var setOverview = overview[1];
  overview = overview[0];
  var clinics = useState([]);
  var setClinics = clinics[1];
  clinics = clinics[0];
  var loading = useState(true);
  var setLoading = loading[1];
  loading = loading[0];

  useEffect(function() {
    setLoading(true);
    Promise.all([
      q('/api/admin/clinics/overview'),
      q('/api/admin/clinics')
    ])
    .then(function(results) {
      setOverview(results[0]);
      setClinics((results[1].clinics || []).slice(0, 5));
      setLoading(false);
    })
    .catch(function() { setLoading(false); });
  }, []);

  if (loading) return h(Loading);

  return h('div', null,
    h('div', { className: 'kpi-grid' },
      h(KpiCard, { label: 'Total de Clinicas', value: overview ? overview.total_clinics : '-', variant: 'accent' }),
      h(KpiCard, { label: 'Clinicas Ativas', value: overview ? overview.active_clinics : '-', variant: 'success' }),
      h(KpiCard, { label: 'Total de Pacientes', value: overview ? overview.total_patients : '-' }),
      h(KpiCard, {
        label: 'Alertas Nao Resolvidos',
        value: overview ? overview.unresolved_alerts : '-',
        variant: overview && overview.unresolved_alerts > 0 ? 'danger' : ''
      })
    ),
    h('div', { className: 'section-title' }, 'Clinicas Recentes'),
    h('div', { className: 'table-wrap' },
      h('table', null,
        h('thead', null,
          h('tr', null,
            h('th', null, 'Clinica'),
            h('th', null, 'Pacientes'),
            h('th', null, 'Status'),
            h('th', null, 'Plano')
          )
        ),
        h('tbody', null,
          clinics.length === 0
            ? h('tr', null, h('td', { colSpan: 4, style: { textAlign: 'center', color: 'var(--text-secondary)', padding: '32px' } }, 'Nenhuma clinica cadastrada.'))
            : clinics.map(function(c) {
                var plan = c.billing ? c.billing.plan : null;
                return h('tr', { key: c.id },
                  h('td', null,
                    h('div', { className: 'clinic-name' }, c.name),
                    h('div', { className: 'clinic-email' }, c.email)
                  ),
                  h('td', null, c.metrics ? c.metrics.total_patients : '-'),
                  h('td', null,
                    h('span', { className: 'badge ' + (c.is_active ? 'badge-active' : 'badge-inactive') },
                      c.is_active ? 'Ativa' : 'Inativa'
                    )
                  ),
                  h('td', null,
                    plan ? h('span', { className: 'badge badge-' + plan }, plan) : h('span', { style: { color: 'var(--text-secondary)', fontSize: '12px' } }, '-')
                  )
                );
              })
        )
      )
    )
  );
}

// ─── Clinics Page ─────────────────────────────────────────────
function ClinicsPage() {
  var clinics = useState([]);
  var setClinics = clinics[1];
  clinics = clinics[0];
  var loading = useState(true);
  var setLoading = loading[1];
  loading = loading[0];
  var search = useState('');
  var setSearch = search[1];
  search = search[0];
  var filter = useState('all');
  var setFilter = filter[1];
  filter = filter[0];
  var selected = useState(null);
  var setSelected = selected[1];
  selected = selected[0];

  function loadClinics() {
    setLoading(true);
    q('/api/admin/clinics')
      .then(function(data) { setClinics(data.clinics || []); setLoading(false); })
      .catch(function() { setLoading(false); });
  }

  useEffect(function() { loadClinics(); }, []);

  function onStatusChanged(updated) {
    setClinics(function(prev) {
      return prev.map(function(c) {
        if (c.id === updated.id) {
          var next = {};
          Object.keys(c).forEach(function(k) { next[k] = c[k]; });
          next.is_active = updated.is_active;
          return next;
        }
        return c;
      });
    });
  }

  var filtered = clinics.filter(function(c) {
    var matchSearch = !search || c.name.toLowerCase().indexOf(search.toLowerCase()) !== -1 || (c.email && c.email.toLowerCase().indexOf(search.toLowerCase()) !== -1);
    var matchFilter = filter === 'all' || (filter === 'active' && c.is_active) || (filter === 'inactive' && !c.is_active);
    return matchSearch && matchFilter;
  });

  if (loading) return h(Loading);

  return h('div', null,
    h('div', { className: 'table-wrap' },
      h('div', { className: 'table-toolbar' },
        h('input', {
          className: 'search-input',
          type: 'text',
          placeholder: 'Buscar por nome ou email...',
          value: search,
          onChange: function(e) { setSearch(e.target.value); }
        }),
        h('button', {
          className: 'filter-btn' + (filter === 'all' ? ' active' : ''),
          onClick: function() { setFilter('all'); }
        }, 'Todas'),
        h('button', {
          className: 'filter-btn' + (filter === 'active' ? ' active' : ''),
          onClick: function() { setFilter('active'); }
        }, 'Ativas'),
        h('button', {
          className: 'filter-btn' + (filter === 'inactive' ? ' active' : ''),
          onClick: function() { setFilter('inactive'); }
        }, 'Inativas')
      ),
      h('table', null,
        h('thead', null,
          h('tr', null,
            h('th', null, 'Clinica'),
            h('th', null, 'Pacientes'),
            h('th', null, 'Usuarios'),
            h('th', null, 'Status'),
            h('th', null, 'Plano'),
            h('th', null, 'Desde'),
            h('th', null, 'Acoes')
          )
        ),
        h('tbody', null,
          filtered.length === 0
            ? h('tr', null, h('td', { colSpan: 7, style: { textAlign: 'center', color: 'var(--text-secondary)', padding: '32px' } }, 'Nenhuma clinica encontrada.'))
            : filtered.map(function(c) {
                var plan = c.billing ? c.billing.plan : null;
                return h('tr', { key: c.id },
                  h('td', null,
                    h('div', { className: 'clinic-name' }, c.name),
                    h('div', { className: 'clinic-email' }, c.email)
                  ),
                  h('td', null, c.metrics ? c.metrics.total_patients : '-'),
                  h('td', null, c.metrics ? c.metrics.total_users : '-'),
                  h('td', null,
                    h('span', { className: 'badge ' + (c.is_active ? 'badge-active' : 'badge-inactive') },
                      c.is_active ? 'Ativa' : 'Inativa'
                    )
                  ),
                  h('td', null,
                    plan ? h('span', { className: 'badge badge-' + plan }, plan) : h('span', { style: { color: 'var(--text-secondary)', fontSize: '12px' } }, '-')
                  ),
                  h('td', null, formatDate(c.created_at)),
                  h('td', null,
                    h('button', {
                      className: 'btn-action',
                      onClick: function() { setSelected(c); }
                    }, 'Detalhes')
                  )
                );
              })
        )
      )
    ),
    selected ? h(ClinicDetailModal, {
      clinic: selected,
      onClose: function() { setSelected(null); },
      onStatusChanged: onStatusChanged
    }) : null
  );
}

// ─── Coming Soon ──────────────────────────────────────────────
function ComingSoonPage(props) {
  return h('div', { className: 'coming-soon' },
    h('div', { className: 'icon' }, props.icon || '...'),
    h('h2', null, props.title),
    h('p', null, props.description || 'Esta funcionalidade sera implementada em breve.')
  );
}

// ─── Sidebar ──────────────────────────────────────────────────
function Sidebar(props) {
  var user = props.user;

  var navItems = [
    { id: 'dashboard', label: 'Dashboard', icon: 'o', section: 'PLATAFORMA' },
    { id: 'clinics', label: 'Clinicas', icon: '#', section: null },
    { id: 'usage', label: 'Uso de Tokens', icon: '~', section: null, soon: 'F8B' },
    { id: 'billing', label: 'Billing', icon: '$', section: null, soon: 'F8C' },
    { id: 'alerts', label: 'Alertas', icon: '!', section: null, soon: 'F8D' }
  ];

  return h('div', { className: 'sidebar' },
    h('div', { className: 'sidebar-logo' },
      h('div', { className: 'brand' }, 'GV AUTOMACOES'),
      h('div', { className: 'title' }, 'Backoffice')
    ),
    h('nav', { className: 'sidebar-nav' },
      navItems.map(function(item, i) {
        return h('div', { key: item.id },
          item.section ? h('div', { className: 'nav-section' }, item.section) : null,
          h('button', {
            className: 'nav-item' + (props.page === item.id ? ' active' : ''),
            onClick: function() { props.onNavigate(item.id); }
          },
            h('span', { className: 'icon' }, item.icon),
            item.label,
            item.soon ? h('span', { className: 'soon' }, item.soon) : null
          )
        );
      })
    ),
    h('div', { className: 'sidebar-footer' },
      user ? h('div', { className: 'admin-info' },
        h('div', { className: 'admin-name' }, user.name),
        h('div', { className: 'admin-role' }, user.role)
      ) : null,
      h('button', { className: 'btn-logout', onClick: props.onLogout }, '+ Sair')
    )
  );
}

// ─── App Root ─────────────────────────────────────────────────
function App() {
  var token = getToken();
  if (!token) {
    window.location.href = '/admin/login.html';
    return null;
  }

  var page = useState('dashboard');
  var setPage = page[1];
  page = page[0];
  var user = useState(getUser());
  user = user[0];

  function handleLogout() {
    q('/api/admin/auth/logout', { method: 'POST' }).catch(function() {});
    clearAuth();
    window.location.href = '/admin/login.html';
  }

  var pageTitle = {
    dashboard: 'Dashboard',
    clinics: 'Clinicas',
    usage: 'Uso de Tokens',
    billing: 'Billing',
    alerts: 'Alertas do Sistema'
  };

  var pageSubtitle = {
    dashboard: 'Visao geral da plataforma',
    clinics: 'Gerencie todas as clinicas',
    usage: 'Monitoramento de tokens OpenAI',
    billing: 'Cobrancas e faturas',
    alerts: 'Alertas e incidentes'
  };

  function renderPage() {
    if (page === 'dashboard') return h(DashboardPage);
    if (page === 'clinics') return h(ClinicsPage);
    if (page === 'usage') return h(ComingSoonPage, {
      icon: '~',
      title: 'Uso de Tokens (F8B)',
      description: 'Monitoramento de consumo de tokens OpenAI por clinica sera implementado no F8B.'
    });
    if (page === 'billing') return h(ComingSoonPage, {
      icon: '$',
      title: 'Billing (F8C)',
      description: 'Integracao com Asaas e gestao de cobrancas sera implementada no F8C.'
    });
    if (page === 'alerts') return h(ComingSoonPage, {
      icon: '!',
      title: 'Alertas do Sistema (F8D)',
      description: 'Central de alertas e incidentes da plataforma sera implementada no F8D.'
    });
    return null;
  }

  return h('div', { id: 'root-inner', style: { display: 'flex', minHeight: '100vh', width: '100%' } },
    h(Sidebar, {
      page: page,
      user: user,
      onNavigate: setPage,
      onLogout: handleLogout
    }),
    h('div', { className: 'main' },
      h('div', { className: 'topbar' },
        h('div', null,
          h('h1', null, pageTitle[page] || page),
          h('div', { className: 'sub' }, pageSubtitle[page] || '')
        )
      ),
      h('div', { className: 'content' },
        renderPage()
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
