<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GV AUTOMACOES - Backoffice</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --accent: #6366F1;
      --accent-hover: #4F46E5;
      --bg-base: #070A0F;
      --bg-card: rgba(255,255,255,0.04);
      --bg-card-hover: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.08);
      --text-primary: #E8EAF0;
      --text-secondary: #9CA3AF;
      --success: #10B981;
      --danger: #EF4444;
      --warning: #F59E0B;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
    }
    #root { display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 240px;
      min-height: 100vh;
      background: rgba(255,255,255,0.02);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 0;
      flex-shrink: 0;
    }
    .sidebar-logo {
      padding: 0 20px 24px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo .brand { font-size: 11px; color: #6B7280; letter-spacing: 2px; text-transform: uppercase; }
    .sidebar-logo .title { font-size: 16px; font-weight: 700; margin-top: 4px; }
    .sidebar-nav { flex: 1; padding: 16px 12px; }
    .nav-section { font-size: 10px; color: #4B5563; text-transform: uppercase; letter-spacing: 1.5px; padding: 8px 8px 4px; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
      margin-bottom: 2px;
      transition: background 0.15s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }
    .nav-item:hover { background: var(--bg-card-hover); color: var(--text-primary); }
    .nav-item.active { background: rgba(99,102,241,0.15); color: var(--accent); }
    .nav-item .icon { font-size: 16px; width: 18px; text-align: center; }
    .nav-item .badge {
      margin-left: auto;
      background: var(--danger);
      color: white;
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 10px;
    }
    .nav-item .soon {
      margin-left: auto;
      font-size: 10px;
      color: #4B5563;
      background: rgba(255,255,255,0.04);
      padding: 1px 6px;
      border-radius: 4px;
    }
    .sidebar-footer {
      padding: 16px 12px;
      border-top: 1px solid var(--border);
    }
    .admin-info {
      padding: 8px 12px;
      border-radius: 8px;
      background: var(--bg-card);
      margin-bottom: 8px;
    }
    .admin-info .admin-name { font-size: 13px; font-weight: 600; }
    .admin-info .admin-role { font-size: 11px; color: var(--text-secondary); text-transform: capitalize; }
    .btn-logout {
      width: 100%;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      text-align: left;
    }
    .btn-logout:hover { background: rgba(239,68,68,0.08); color: var(--danger); border-color: rgba(239,68,68,0.3); }

    /* Main */
    .main { flex: 1; display: flex; flex-direction: column; overflow: auto; }
    .topbar {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar h1 { font-size: 20px; font-weight: 700; }
    .topbar .sub { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
    .content { padding: 32px; }

    /* KPI Cards */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .kpi-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .kpi-label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
    .kpi-value { font-size: 32px; font-weight: 700; margin: 8px 0 4px; }
    .kpi-sub { font-size: 12px; color: var(--text-secondary); }
    .kpi-card.danger { border-color: rgba(239,68,68,0.3); }
    .kpi-card.danger .kpi-value { color: var(--danger); }
    .kpi-card.success .kpi-value { color: var(--success); }
    .kpi-card.accent .kpi-value { color: var(--accent); }

    /* Section */
    .section-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }

    /* Table */
    .table-wrap {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .table-toolbar {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .search-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      color: var(--text-primary);
      font-size: 13px;
      outline: none;
      max-width: 320px;
    }
    .search-input:focus { border-color: rgba(99,102,241,0.5); }
    .filter-btn {
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
    }
    .filter-btn.active { background: rgba(99,102,241,0.15); color: var(--accent); border-color: rgba(99,102,241,0.4); }
    table { width: 100%; border-collapse: collapse; }
    th {
      padding: 12px 20px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid var(--border);
    }
    td { padding: 14px 20px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .clinic-name { font-weight: 600; }
    .clinic-email { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .badge-active { background: rgba(16,185,129,0.15); color: var(--success); }
    .badge-inactive { background: rgba(239,68,68,0.12); color: var(--danger); }
    .badge-starter { background: rgba(156,163,175,0.15); color: #9CA3AF; }
    .badge-pro { background: rgba(99,102,241,0.15); color: var(--accent); }
    .badge-enterprise { background: rgba(245,158,11,0.15); color: var(--warning); }
    .badge-pending { background: rgba(245,158,11,0.15); color: var(--warning); }
    .badge-received, .badge-confirmed { background: rgba(16,185,129,0.15); color: var(--success); }
    .badge-overdue { background: rgba(239,68,68,0.12); color: var(--danger); }
    .badge-refunded, .badge-cancelled { background: rgba(156,163,175,0.15); color: #9CA3AF; }
    .badge-error { background: rgba(239,68,68,0.12); color: #EF4444; }
    .badge-warning { background: rgba(245,158,11,0.15); color: #F59E0B; }
    .badge-info { background: rgba(59,130,246,0.15); color: #3B82F6; }
    .badge-superadmin { background: rgba(139,92,246,0.15); color: #8B5CF6; }
    .badge-admin { background: rgba(59,130,246,0.15); color: #3B82F6; }
    .badge-viewer { background: rgba(156,163,175,0.15); color: #9CA3AF; }
    .badge-basic { background: rgba(156,163,175,0.15); color: #9CA3AF; }
    .badge-premium { background: rgba(245,158,11,0.15); color: var(--warning); }
    .onboarding-success { background: var(--bg-card); border: 1px solid var(--success); border-radius: 12px; padding: 24px; margin-top: 20px; }
    .onboarding-success h3 { color: var(--success); margin-bottom: 12px; }
    .form-section { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .form-section-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--text-primary); }
    .btn-action {
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text-secondary);
      font-size: 12px;
      cursor: pointer;
    }
    .btn-action:hover { background: var(--bg-card-hover); color: var(--text-primary); }
    .btn-primary {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary:hover { background: var(--accent-hover); }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 24px;
    }
    .modal {
      background: #0D1117;
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 680px;
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal-header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-header h2 { font-size: 18px; font-weight: 700; }
    .modal-close {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
    }
    .modal-close:hover { background: var(--bg-card-hover); color: var(--text-primary); }
    .modal-body { padding: 24px; }
    .modal-section { margin-bottom: 24px; }
    .modal-section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { font-size: 13px; color: var(--text-secondary); }
    .detail-value { font-size: 13px; font-weight: 500; }

    /* Form */
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; display: block; }
    .form-input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 14px;
      color: var(--text-primary);
      font-size: 13px;
      outline: none;
    }
    .form-input:focus { border-color: rgba(99,102,241,0.5); }
    .form-select {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 14px;
      color: var(--text-primary);
      font-size: 13px;
      outline: none;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-footer { padding: 20px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }

    /* Loading */
    .loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: var(--text-secondary); font-size: 14px; }
    .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Empty */
    .empty { padding: 60px; text-align: center; color: var(--text-secondary); font-size: 14px; }

    /* Period selector */
    .period-bar { display: flex; align-items: center; gap: 10px; }
    .period-select {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      color: var(--text-primary);
      font-size: 13px;
      outline: none;
    }

    /* Usage table */
    .cost-cell { font-family: 'SF Mono', 'Consolas', monospace; font-size: 13px; }
    .cost-zero { color: var(--text-secondary); }

    /* Chart canvas container */
    .chart-wrap {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .chart-wrap canvas { max-height: 200px; }

    /* Coming soon */
    .coming-soon {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px;
      text-align: center;
    }
    .coming-soon .icon { font-size: 48px; margin-bottom: 16px; }
    .coming-soon h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .coming-soon p { color: var(--text-secondary); font-size: 14px; }

    /* Alert row */
    .alert-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .alert-row:last-child { border-bottom: none; }
    .alert-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .alert-dot-error { background: var(--danger); }
    .alert-dot-warning { background: var(--warning); }
    .alert-dot-info { background: var(--accent); }
    .alert-title { font-size: 13px; font-weight: 500; }
    .alert-time { font-size: 11px; color: var(--text-secondary); }

    /* User row */
    .user-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 12px;
      margin: 3px;
    }
    .user-role { color: var(--text-secondary); }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
var h = React.createElement;
var useState = React.useState;
var useEffect = React.useEffect;
var useCallback = React.useCallback;

// ─── Auth helpers ──────────────────────────────────────────────
function getToken() { return localStorage.getItem('gv_admin_token'); }
function getUser() {
  var raw = localStorage.getItem('gv_admin_user');
  try { return raw ? JSON.parse(raw) : null; } catch(e) { return null; }
}
function clearAuth() {
  localStorage.removeItem('gv_admin_token');
  localStorage.removeItem('gv_admin_user');
}

function q(path, opts) {
  var token = getToken();
  var headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  return fetch(path, Object.assign({}, opts || {}, { headers: headers }))
    .then(function(res) {
      if (res.status === 401) {
        clearAuth();
        window.location.href = '/admin/login.html';
        return Promise.reject(new Error('Unauthorized'));
      }
      return res.json();
    });
}

function formatDate(iso) {
  if (!iso) return '-';
  return new Date(iso).toLocaleDateString('pt-BR');
}

// ─── KPI Card ─────────────────────────────────────────────────
function KpiCard(props) {
  return h('div', { className: 'kpi-card' + (props.variant ? ' ' + props.variant : '') },
    h('div', { className: 'kpi-label' }, props.label),
    h('div', { className: 'kpi-value' }, props.value),
    props.sub ? h('div', { className: 'kpi-sub' }, props.sub) : null
  );
}

// ─── Loading ──────────────────────────────────────────────────
function Loading() {
  return h('div', { className: 'loading' },
    h('div', { className: 'spinner' }),
    'Carregando...'
  );
}

// ─── Billing Form ─────────────────────────────────────────────
function BillingForm(props) {
  var billing = props.billing || {};
  var state = useState({
    plan: billing.plan || 'starter',
    monthly_fee: billing.monthly_fee || 0,
    billing_day: billing.billing_day || 1,
    price_per_1k_tokens_input: billing.price_per_1k_tokens_input || 0,
    price_per_1k_tokens_output: billing.price_per_1k_tokens_output || 0,
    price_per_template: billing.price_per_template || 0,
    asaas_customer_id: billing.asaas_customer_id || '',
    notes: billing.notes || ''
  });
  var form = state[0];
  var setForm = state[1];
  var saving = useState(false);
  var setSaving = saving[1];
  saving = saving[0];

  function set(field, val) {
    setForm(function(prev) {
      var next = {};
      Object.keys(prev).forEach(function(k) { next[k] = prev[k]; });
      next[field] = val;
      return next;
    });
  }

  function save() {
    setSaving(true);
    q('/api/admin/clinics/' + props.clinicId + '/billing', {
      method: 'PUT',
      body: JSON.stringify(form)
    })
    .then(function(data) {
      setSaving(false);
      if (data.id) { props.onSaved(data); }
    })
    .catch(function() { setSaving(false); });
  }

  return h('div', null,
    h('div', { className: 'form-row' },
      h('div', { className: 'form-group' },
        h('label', { className: 'form-label' }, 'Plano'),
        h('select', {
          className: 'form-select',
          value: form.plan,
          onChange: function(e) { set('plan', e.target.value); }
        },
          h('option', { value: 'starter' }, 'Starter'),
          h('option', { value: 'pro' }, 'Pro'),
          h('option', { value: 'enterprise' }, 'Enterprise')
        )
      ),
      h('div', { className: 'form-group' },
        h('label', { className: 'form-label' }, 'Mensalidade (R$)'),
        h('input', {
          className: 'form-input',
          type: 'number',
          step: '0.01',
          value: form.monthly_fee,
          onChange: function(e) { set('monthly_fee', parseFloat(e.target.value) || 0); }
        })
      )
    ),
    h('div', { className: 'form-row' },
      h('div', { className: 'form-group' },
        h('label', { className: 'form-label' }, 'Preco por 1k tokens entrada'),
        h('input', {
          className: 'form-input',
          type: 'number',
          step: '0.000001',
          value: form.price_per_1k_tokens_input,
          onChange: function(e) { set('price_per_1k_tokens_input', parseFloat(e.target.value) || 0); }
        })
      ),
      h('div', { className: 'form-group' },
        h('label', { className: 'form-label' }, 'Preco por 1k tokens saida'),
        h('input', {
          className: 'form-input',
          type: 'number',
          step: '0.000001',
          value: form.price_per_1k_tokens_output,
          onChange: function(e) { set('price_per_1k_tokens_output', parseFloat(e.target.value) || 0); }
        })
      )
    ),
    h('div', { className: 'form-row' },
      h('div', { className: 'form-group' },
        h('label', { className: 'form-label' }, 'Preco por template'),
        h('input', {
          className: 'form-input',
          type: 'number',
          step: '0.0001',
          value: form.price_per_template,
          onChange: function(e) { set('price_per_template', parseFloat(e.target.value) || 0); }
        })
      ),
      h('div', { className: 'form-group' },
        h('label', { className: 'form-label' }, 'Dia de cobranca (1-28)'),
        h('input', {
          className: 'form-input',
          type: 'number',
          min: '1',
          max: '28',
          value: form.billing_day,
          onChange: function(e) { set('billing_day', parseInt(e.target.value) || 1); }
        })
      )
    ),
    h('div', { className: 'form-group' },
      h('label', { className: 'form-label' }, 'ID Cliente Asaas'),
      h('input', {
        className: 'form-input',
        type: 'text',
        placeholder: 'cus_...',
        value: form.asaas_customer_id,
        onChange: function(e) { set('asaas_customer_id', e.target.value); }
      })
    ),
    h('div', { className: 'form-group' },
      h('label', { className: 'form-label' }, 'Notas internas'),
      h('input', {
        className: 'form-input',
        type: 'text',
        value: form.notes,
        onChange: function(e) { set('notes', e.target.value); }
      })
    ),
    h('div', { style: { textAlign: 'right', marginTop: '8px' } },
      h('button', {
        className: 'btn-primary',
        disabled: saving,
        onClick: save
      }, saving ? 'Salvando...' : 'Salvar Billing')
    )
  );
}

// ─── Clinic Detail Modal ───────────────────────────────────────
function ClinicDetailModal(props) {
  var detail = useState(null);
  var setDetail = detail[1];
  detail = detail[0];
  var loading = useState(true);
  var setLoading = loading[1];
  loading = loading[0];
  var toggling = useState(false);
  var setToggling = toggling[1];
  toggling = toggling[0];

  useEffect(function() {
    setLoading(true);
    q('/api/admin/clinics/' + props.clinic.id)
      .then(function(data) { setDetail(data); setLoading(false); })
      .catch(function() { setLoading(false); });
  }, [props.clinic.id]);

  function toggleStatus() {
    if (!detail) return;
    setToggling(true);
    q('/api/admin/clinics/' + detail.id + '/status', {
      method: 'PATCH',
      body: JSON.stringify({ is_active: !detail.is_active })
    })
    .then(function(data) {
      setDetail(function(prev) {
        var next = {};
        Object.keys(prev).forEach(function(k) { next[k] = prev[k]; });
        next.is_active = data.is_active;
        return next;
      });
      setToggling(false);
      props.onStatusChanged(data);
    })

function formatBRL(value) {

}

    'CONFIRMED': 'Confirmado',
    'OVERDUE': 'Vencido',
    'REFUNDED': 'Estornado',
    'CANCELLED': 'Cancelado'
  };
  return map[status] || status;
}

function billingStatusClass(status) {
  var map = {
    'PENDING': 'badge-pending',
    'RECEIVED': 'badge-received',

    'OVERDUE': 'badge-overdue',
    'REFUNDED': 'badge-refunded',

  };
  return 'badge ' + (map[status] || 'badge-starter');
}

  function submitCadastrar() {
    if (!modalData.name || !modalData.email) return;
    setSaving(true);
    q('/api/admin/billing/customers', {
      method: 'POST',
      body: JSON.stringify(modalData)

      .then(function(res) {
        setSaving(false);
        if (res.error) { alert('Erro: ' + res.error); return; }
        alert('Cliente cadastrado no Asaas com sucesso! ID: ' + res.customer.id);
        setModal(null);
        loadClinics();

      .catch(function(err) { setSaving(false); alert('Erro: ' + err.message); });

                return h('option', { key: c.id, value: c.billing.asaas_customer_id }, c.name);

          h('div', { className: 'form-group' },
            h('label', null, 'Valor (R$)'),
            h('input', { className: 'form-input', type: 'number', step: '0.01', value: modalData.value, onChange: function(e) { setField('value', parseFloat(e.target.value) || 0); } })
          ),

            h('label', null, 'Vencimento'),
            h('input', { className: 'form-input', type: 'date', value: modalData.due_date, onChange: function(e) { setField('due_date', e.target.value); } })
          ),
          h('div', { className: 'form-group' },
            h('label', null, 'Descricao'),
            h('input', { className: 'form-input', value: modalData.description, onChange: function(e) { setField('description', e.target.value); } })
          ),
          h('div', { className: 'form-group' },
            h('label', null, 'Tipo de Cobranca'),
            h('select', { className: 'form-input', value: modalData.billing_type, onChange: function(e) { setField('billing_type', e.target.value); } },
              h('option', { value: 'UNDEFINED' }, 'Cliente escolhe'),
              h('option', { value: 'BOLETO' }, 'Boleto'),

              h('option', { value: 'CREDIT_CARD' }, 'Cartao de Credito')

            h('div', { style: { display: 'flex', justifyContent: 'space-between', fontSize: '13px', marginBottom: '6px' } },

// ─── Alerts Page (F8D) ───────────────────────────────────────
function AlertsPage() {
  var alertsState = useState([]);
  var alerts = alertsState[0]; var setAlerts = alertsState[1];
  var loadingState = useState(true);
  var loading = loadingState[0]; var setLoading = loadingState[1];
  var filterTypeState = useState('');
  var filterType = filterTypeState[0]; var setFilterType = filterTypeState[1];
  var filterStatusState = useState('false');
  var filterStatus = filterStatusState[0]; var setFilterStatus = filterStatusState[1];
  var filterClinicState = useState('');
  var filterClinic = filterClinicState[0]; var setFilterClinic = filterClinicState[1];
  var clinicsState = useState([]);
  var clinicsList = clinicsState[0]; var setClinicsList = clinicsState[1];
  var modalState = useState(false);
  var showModal = modalState[0]; var setShowModal = modalState[1];
  var formState = useState({ alert_type: 'info', source: 'internal', clinic_id: '', title: '', message: '' });
  var form = formState[0]; var setForm = formState[1];
  var savingState = useState(false);
  var saving = savingState[0]; var setSaving = savingState[1];
  var expandedState = useState(null);
  var expanded = expandedState[0]; var setExpanded = expandedState[1];

  function loadAlerts() {
    setLoading(true);
    var params = [];
    if (filterType) params.push('alert_type=' + filterType);
    if (filterStatus !== '') params.push('is_resolved=' + filterStatus);
    if (filterClinic) params.push('clinic_id=' + filterClinic);
    var qs = params.length > 0 ? '?' + params.join('&') : '';
    q('/api/admin/alerts' + qs)
      .then(function(data) { setAlerts(data.alerts || []); setLoading(false); })
      .catch(function() { setLoading(false); });
  }

  useEffect(function() { loadAlerts(); }, [filterType, filterStatus, filterClinic]);
  useEffect(function() {
    q('/api/admin/clinics').then(function(data) { setClinicsList(data.clinics || data || []); }).catch(function() {});
  }, []);

  var unresolvedCount = alerts.filter(function(a) { return !a.is_resolved; }).length;

  function resolveAlert(id) {
    q('/api/admin/alerts/' + id + '/resolve', { method: 'PATCH' })
      .then(function() { loadAlerts(); })
      .catch(function(err) { alert('Erro: ' + err.message); });
  }

  function deleteAlert(id) {
    if (!confirm('Remover este alerta?')) return;
    q('/api/admin/alerts/' + id, { method: 'DELETE' })
      .then(function() { loadAlerts(); })
      .catch(function(err) { alert('Erro: ' + err.message); });
  }

  function setFormField(field, val) {
    var next = Object.assign({}, form);
    next[field] = val;
    setForm(next);
  }

  function submitAlert() {
    if (!form.title || !form.message) { alert('Preencha titulo e mensagem.'); return; }
    setSaving(true);
    q('/api/admin/alerts', { method: 'POST', body: JSON.stringify(form) })
      .then(function(res) {
        setSaving(false);
        if (res.error) { alert('Erro: ' + res.error); return; }
        setShowModal(false);
        setForm({ alert_type: 'info', source: 'internal', clinic_id: '', title: '', message: '' });
        loadAlerts();
      })
      .catch(function(err) { setSaving(false); alert('Erro: ' + err.message); });
  }

  var alertTypeIcon = { error: 'x', warning: '!', info: 'i' };

  return h('div', null,
    // Toolbar
    h('div', { style: { display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '24px', flexWrap: 'wrap' } },
      h('button', { className: 'btn-primary', onClick: function() { setShowModal(true); } }, '+ Novo Alerta'),
      unresolvedCount > 0 ? h('span', { className: 'badge badge-error', style: { fontSize: '13px', padding: '4px 12px' } }, unresolvedCount + ' nao resolvido(s)') : null,
      h('div', { style: { marginLeft: 'auto', display: 'flex', gap: '8px', flexWrap: 'wrap' } },
        h('select', { className: 'period-select', value: filterType, onChange: function(e) { setFilterType(e.target.value); } },
          h('option', { value: '' }, 'Todos tipos'),
          h('option', { value: 'error' }, 'Error'),
          h('option', { value: 'warning' }, 'Warning'),
          h('option', { value: 'info' }, 'Info')
        ),
        h('select', { className: 'period-select', value: filterStatus, onChange: function(e) { setFilterStatus(e.target.value); } },
          h('option', { value: 'false' }, 'Nao resolvidos'),
          h('option', { value: 'true' }, 'Resolvidos'),
          h('option', { value: '' }, 'Todos')
        ),
        h('select', { className: 'period-select', value: filterClinic, onChange: function(e) { setFilterClinic(e.target.value); } },
          h('option', { value: '' }, 'Todas clinicas'),
          clinicsList.map(function(c) { return h('option', { key: c.id, value: c.id }, c.name); })
        )
      )
    ),

    loading ? h(Loading) :
    alerts.length === 0
      ? h('div', { style: { textAlign: 'center', color: 'var(--text-secondary)', padding: '60px 20px' } },
          h('div', { style: { fontSize: '32px', marginBottom: '12px' } }, '!'),
          h('p', null, 'Nenhum alerta encontrado com os filtros selecionados.')
        )
      : h('div', { className: 'table-wrap' },
          h('table', null,
            h('thead', null,
              h('tr', null,
                h('th', { style: { width: '50px' } }, 'Tipo'),
                h('th', null, 'Titulo'),
                h('th', null, 'Clinica'),
                h('th', null, 'Fonte'),
                h('th', null, 'Data'),
                h('th', null, 'Status'),
                h('th', null, 'Acoes')
              )
            ),
            h('tbody', null,
              alerts.map(function(a) {
                var isExpanded = expanded === a.id;
                return h(React.Fragment, { key: a.id },
                  h('tr', { style: { cursor: 'pointer' }, onClick: function() { setExpanded(isExpanded ? null : a.id); } },
                    h('td', null, h('span', { className: 'badge badge-' + a.alert_type, style: { fontWeight: 700 } }, alertTypeIcon[a.alert_type] || '?')),

        h('div', { className: 'modal-header' },

        h('div', { className: 'modal-body' },

            h('label', null, 'Tipo'),
            h('select', { className: 'form-input', value: form.alert_type, onChange: function(e) { setFormField('alert_type', e.target.value); } },
              h('option', { value: 'error' }, 'Error'),

          ),
          h('div', { className: 'form-group' },

            h('select', { className: 'form-input', value: form.source, onChange: function(e) { setFormField('source', e.target.value); } },
              h('option', { value: 'internal' }, 'Internal'),
              h('option', { value: 'railway' }, 'Railway'),

            )

// ─── Onboarding Page (F8D) ───────────────────────────────────
function OnboardingPage() {
  var formState = useState({
    clinic_name: '', clinic_phone: '',
    owner_name: '', owner_email: '', owner_password: '',
    plan: 'basic', monthly_fee: 0, billing_day: 1
  });
  var form = formState[0]; var setForm = formState[1];
  var savingState = useState(false);
  var saving = savingState[0]; var setSaving = savingState[1];
  var resultState = useState(null);
  var result = resultState[0]; var setResult = resultState[1];

  function setField(field, val) {
    var next = Object.assign({}, form);
    next[field] = val;
    setForm(next);
  }

  function submitOnboarding() {
    if (!form.clinic_name || !form.owner_email || !form.owner_name || !form.owner_password) {
      alert('Preencha todos os campos obrigatorios.'); return;
    }
    if (form.owner_password.length < 6) {
      alert('Senha deve ter no minimo 6 caracteres.'); return;
    }
    setSaving(true);
    setResult(null);
    q('/api/admin/onboarding/clinic', { method: 'POST', body: JSON.stringify(form) })
      .then(function(res) {
        setSaving(false);
        if (res.error) { alert('Erro: ' + res.error); return; }
        setResult(res);
      })
      .catch(function(err) { setSaving(false); alert('Erro: ' + err.message); });
  }

  function resetForm() {
    setForm({ clinic_name: '', clinic_phone: '', owner_name: '', owner_email: '', owner_password: '', plan: 'basic', monthly_fee: 0, billing_day: 1 });
    setResult(null);
  }

  if (result) {
    return h('div', null,
      h('div', { className: 'onboarding-success' },
        h('h3', null, 'Clinica criada com sucesso!'),
        h('div', { style: { fontSize: '14px', lineHeight: '1.8' } },
          h('div', null, 'Clinica: ' + h('strong', null, result.clinic.name) + ' (ID: ' + result.clinic.id.substring(0, 8) + '...)'),
          h('div', null, 'Owner: ' + h('strong', null, result.owner.email) + ' (' + result.owner.name + ')')
        ),
        h('div', { style: { marginTop: '16px' } },
          h('div', { style: { fontWeight: 600, marginBottom: '8px' } }, 'Proximos passos:'),
          h('ul', { style: { margin: 0, paddingLeft: '20px', fontSize: '13px', color: 'var(--text-secondary)' } },
            result.next_steps.map(function(step, i) { return h('li', { key: i, style: { marginBottom: '4px' } }, step); })
          )
        ),
        h('div', { style: { marginTop: '20px' } },
          h('button', { className: 'btn-primary', onClick: resetForm }, 'Criar outra clinica')
        )
      )
    );
  }

  return h('div', null,
    h('div', { style: { maxWidth: '600px' } },
      // Secao 1: Dados da Clinica
      h('div', { className: 'form-section' },
        h('div', { className: 'form-section-title' }, 'Dados da Clinica'),
        h('div', { className: 'form-group' },
          h('label', null, 'Nome da Clinica *'),
          h('input', { className: 'form-input', value: form.clinic_name, onChange: function(e) { setField('clinic_name', e.target.value); } })
        )
      ),

      // Secao 2: Usuario Owner
      h('div', { className: 'form-section' },
        h('div', { className: 'form-section-title' }, 'Usuario Owner'),
        h('div', { className: 'form-group' },
          h('label', null, 'Nome completo *'),
          h('input', { className: 'form-input', value: form.owner_name, onChange: function(e) { setField('owner_name', e.target.value); } })
        ),
        h('div', { className: 'form-group' },
          h('label', null, 'Email *'),
          h('input', { className: 'form-input', type: 'email', value: form.owner_email, onChange: function(e) { setField('owner_email', e.target.value); } })
        ),
        h('div', { className: 'form-group' },
          h('label', null, 'Senha inicial *'),
          h('input', { className: 'form-input', type: 'password', value: form.owner_password, onChange: function(e) { setField('owner_password', e.target.value); } }),
          h('div', { style: { fontSize: '11px', color: 'var(--text-secondary)', marginTop: '4px' } }, 'Minimo 6 caracteres')
        )
      ),

      // Secao 3: Plano e Billing
      h('div', { className: 'form-section' },
        h('div', { className: 'form-section-title' }, 'Plano e Billing'),
        h('div', { style: { display: 'flex', gap: '12px' } },
          h('div', { className: 'form-group', style: { flex: 1 } },
            h('label', null, 'Plano'),
            h('select', { className: 'form-input', value: form.plan, onChange: function(e) { setField('plan', e.target.value); } },
              h('option', { value: 'basic' }, 'Basic'),
              h('option', { value: 'premium' }, 'Premium')
            )
          ),
          h('div', { className: 'form-group', style: { flex: 1 } },
            h('label', null, 'Mensalidade (R$)'),
            h('input', { className: 'form-input', type: 'number', step: '0.01', value: form.monthly_fee, onChange: function(e) { setField('monthly_fee', parseFloat(e.target.value) || 0); } })
          ),
          h('div', { className: 'form-group', style: { flex: 1 } },
            h('label', null, 'Dia cobranca'),
            h('input', { className: 'form-input', type: 'number', min: 1, max: 28, value: form.billing_day, onChange: function(e) { setField('billing_day', parseInt(e.target.value) || 1); } })
          )
        )
      ),

      h('div', { style: { marginTop: '8px' } },
        h('button', { className: 'btn-primary', disabled: saving, onClick: submitOnboarding }, saving ? 'Criando clinica...' : 'Criar Clinica')
      )
    )
  );
}

// ─── GV Admins Page (F8D) ────────────────────────────────────
function GvAdminsPage() {
  var adminsState = useState([]);
  var admins = adminsState[0]; var setAdmins = adminsState[1];
  var loadingState = useState(true);
  var loading = loadingState[0]; var setLoading = loadingState[1];
  var modalState = useState(false);
  var showModal = modalState[0]; var setShowModal = modalState[1];
  var formState = useState({ name: '', email: '', password: '', role: 'admin' });
  var form = formState[0]; var setForm = formState[1];
  var savingState = useState(false);
  var saving = savingState[0]; var setSaving = savingState[1];
  var currentUser = getUser();
  var isSuperadmin = currentUser && currentUser.role === 'superadmin';

  function loadAdmins() {
    setLoading(true);
    q('/api/admin/gv-admins')
      .then(function(data) { setAdmins(data.admins || []); setLoading(false); })
      .catch(function() { setLoading(false); });
  }

  useEffect(function() { loadAdmins(); }, []);

  function setFormField(field, val) {
    var next = Object.assign({}, form);
    next[field] = val;
    setForm(next);
  }

  function submitNewAdmin() {
    if (!form.name || !form.email || !form.password) { alert('Preencha todos os campos.'); return; }
    if (form.password.length < 8) { alert('Senha deve ter no minimo 8 caracteres.'); return; }
    setSaving(true);
    q('/api/admin/gv-admins', { method: 'POST', body: JSON.stringify(form) })
      .then(function(res) {
        setSaving(false);
        if (res.error) { alert('Erro: ' + res.error); return; }
        setShowModal(false);
        setForm({ name: '', email: '', password: '', role: 'admin' });
        loadAdmins();
      })
      .catch(function(err) { setSaving(false); alert('Erro: ' + err.message); });
  }

  function toggleActive(admin) {
    var newStatus = !admin.is_active;
    q('/api/admin/gv-admins/' + admin.id, { method: 'PATCH', body: JSON.stringify({ is_active: newStatus }) })
      .then(function(res) {
        if (res.error) { alert('Erro: ' + res.error); return; }
        loadAdmins();
      })
      .catch(function(err) { alert('Erro: ' + err.message); });
  }

  function removeAdmin(admin) {
    if (!confirm('Remover admin ' + admin.name + '?')) return;
    q('/api/admin/gv-admins/' + admin.id, { method: 'DELETE' })
      .then(function(res) {
        if (res.error) { alert('Erro: ' + res.error); return; }
        loadAdmins();
      })
      .catch(function(err) { alert('Erro: ' + err.message); });
  }

  return h('div', null,
    // Toolbar
    h('div', { style: { display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '24px' } },
      isSuperadmin ? h('button', { className: 'btn-primary', onClick: function() { setShowModal(true); } }, '+ Novo Admin') : null,
      h('span', { style: { marginLeft: 'auto', fontSize: '13px', color: 'var(--text-secondary)' } }, admins.length + ' admin(s) cadastrado(s)')
    ),

    loading ? h(Loading) :
    h('div', { className: 'table-wrap' },
      h('table', null,
        h('thead', null,
          h('tr', null,
            h('th', null, 'Nome'),
            h('th', null, 'Email'),
            h('th', null, 'Role'),
            h('th', null, 'Status'),
            h('th', null, 'Ultimo login'),
            isSuperadmin ? h('th', null, 'Acoes') : null
          )
        ),
        h('tbody', null,
          admins.length === 0
            ? h('tr', null, h('td', { colSpan: isSuperadmin ? 6 : 5, style: { textAlign: 'center', color: 'var(--text-secondary)', padding: '40px' } }, 'Nenhum admin encontrado.'))
            : admins.map(function(a) {
                var isMe = currentUser && currentUser.adminId === a.id;
                return h('tr', { key: a.id },
                  h('td', null,
                    h('span', { style: { fontWeight: 600 } }, a.name),
                    isMe ? h('span', { style: { fontSize: '11px', color: 'var(--accent)', marginLeft: '6px' } }, '(Voce)') : null
                  ),
                  h('td', { style: { fontSize: '13px' } }, a.email),
                  h('td', null, h('span', { className: 'badge badge-' + a.role }, a.role)),
                  h('td', null, h('span', { className: 'badge ' + (a.is_active ? 'badge-active' : 'badge-inactive') }, a.is_active ? 'Ativo' : 'Inativo')),
                  h('td', { style: { fontSize: '12px', color: 'var(--text-secondary)' } }, a.last_login_at ? formatDate(a.last_login_at) : 'Nunca'),
                  isSuperadmin ? h('td', null,
                    !isMe ? h('div', { style: { display: 'flex', gap: '4px' } },
                      h('button', { className: 'btn-action', onClick: function() { toggleActive(a); } }, a.is_active ? 'Desativar' : 'Ativar'),
                      h('button', { className: 'btn-action', style: { color: 'var(--danger)', borderColor: 'var(--danger)' }, onClick: function() { removeAdmin(a); } }, 'Remover')
                    ) : null
                  ) : null
                );
              })
        )
      )
    ),

    // Modal: Novo Admin
    showModal ? h('div', { className: 'modal-overlay', onClick: function(e) { if (e.target === e.currentTarget) setShowModal(false); } },
      h('div', { className: 'modal', style: { maxWidth: '450px' } },
        h('div', { className: 'modal-header' },
          h('h2', null, 'Novo Admin GV'),
          h('button', { className: 'modal-close', onClick: function() { setShowModal(false); } }, 'x')
        ),
        h('div', { className: 'modal-body' },
          h('div', { className: 'form-group' },
            h('label', null, 'Nome'),
            h('input', { className: 'form-input', value: form.name, onChange: function(e) { setFormField('name', e.target.value); } })
          ),
          h('div', { className: 'form-group' },
            h('label', null, 'Email'),
            h('input', { className: 'form-input', type: 'email', value: form.email, onChange: function(e) { setFormField('email', e.target.value); } })
          ),
          h('div', { className: 'form-group' },
            h('label', null, 'Senha'),
            h('input', { className: 'form-input', type: 'password', value: form.password, onChange: function(e) { setFormField('password', e.target.value); } }),
            h('div', { style: { fontSize: '11px', color: 'var(--text-secondary)', marginTop: '4px' } }, 'Minimo 8 caracteres')
          ),
          h('div', { className: 'form-group' },
            h('label', null, 'Role'),
            h('select', { className: 'form-input', value: form.role, onChange: function(e) { setFormField('role', e.target.value); } },
              h('option', { value: 'admin' }, 'Admin'),
              h('option', { value: 'viewer' }, 'Viewer')
            )
          ),
          h('div', { style: { marginTop: '16px', textAlign: 'right' } },
            h('button', { className: 'btn-primary', disabled: saving, onClick: submitNewAdmin }, saving ? 'Criando...' : 'Criar Admin')
          )
        )
      )
    ) : null
  );
}

// ─── Coming Soon ──────────────────────────────────────────────
function ComingSoonPage(props) {
  return h('div', { className: 'coming-soon' },
    h('div', { className: 'icon' }, props.icon || '...'),

// ─── Sidebar ──────────────────────────────────────────────────
function Sidebar(props) {

  var navItems = [
    { id: 'dashboard', label: 'Dashboard', icon: 'o', section: 'PLATAFORMA' },
    { id: 'clinics', label: 'Clinicas', icon: '#', section: null },
    { id: 'usage', label: 'Uso de Tokens', icon: '~', section: null },
    { id: 'billing', label: 'Billing', icon: '$', section: null },
    { id: 'alerts', label: 'Alertas', icon: '!', section: null },
    { id: 'onboarding', label: 'Nova Clinica', icon: '+', section: 'GESTAO' },
    { id: 'gv-admins', label: 'Admins GV', icon: '@', section: null }
  ];

  return h('div', { className: 'sidebar' },
    h('div', { className: 'sidebar-logo' },
      h('div', { className: 'brand' }, 'GV AUTOMACOES'),
      h('div', { className: 'title' }, 'Backoffice')
    ),
    h('nav', { className: 'sidebar-nav' },
      navItems.map(function(item, i) {
        return h('div', { key: item.id },
          item.section ? h('div', { className: 'nav-section' }, item.section) : null,

            className: 'nav-item' + (props.page === item.id ? ' active' : ''),

    h('div', { className: 'sidebar-footer' },

        h('div', { className: 'admin-name' }, user.name),

      ) : null,
      h('button', { className: 'btn-logout', onClick: props.onLogout }, '+ Sair')
    )
  );
}

// ─── App Root ─────────────────────────────────────────────────
function App() {
  var token = getToken();
  if (!token) {
    window.location.href = '/admin/login.html';
    return null;
  }

  var page = useState('dashboard');
  var setPage = page[1];
  page = page[0];
  var user = useState(getUser());
  user = user[0];

  function handleLogout() {
    q('/api/admin/auth/logout', { method: 'POST' }).catch(function() {});
    clearAuth();
    window.location.href = '/admin/login.html';
  }

  var pageTitle = {
    dashboard: 'Dashboard',
    clinics: 'Clinicas',
    usage: 'Uso de Tokens',
    billing: 'Billing',
    alerts: 'Alertas do Sistema',
    onboarding: 'Nova Clinica',
    'gv-admins': 'Admins GV'
  };

  var pageSubtitle = {
    dashboard: 'Visao geral da plataforma',
    clinics: 'Gerencie todas as clinicas',
    usage: 'Monitoramento de tokens OpenAI',
    billing: 'Cobrancas e faturas',
    alerts: 'Alertas e incidentes',
    onboarding: 'Cadastre uma nova clinica na plataforma CLINICORE',
    'gv-admins': 'Gerencie usuarios do backoffice'
  };

  function renderPage() {
    if (page === 'dashboard') return h(DashboardPage);
    if (page === 'clinics') return h(ClinicsPage);
    if (page === 'usage') return h(UsagePage);
    if (page === 'billing') return h(BillingPage);
    if (page === 'alerts') return h(AlertsPage);
    if (page === 'onboarding') return h(OnboardingPage);
    if (page === 'gv-admins') return h(GvAdminsPage);
    return null;
  }

  return h('div', { id: 'root-inner', style: { display: 'flex', minHeight: '100vh', width: '100%' } },
    h(Sidebar, {
      page: page,
      user: user,
      onNavigate: setPage,
      onLogout: handleLogout
    }),
    h('div', { className: 'main' },
      h('div', { className: 'topbar' },
        h('div', null,
          h('h1', null, pageTitle[page] || page),
          h('div', { className: 'sub' }, pageSubtitle[page] || '')
        )
      ),
      h('div', { className: 'content' },
        renderPage()
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
