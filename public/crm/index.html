  <style>

      --bg:#040e1c;--bg2:rgba(5,16,36,.93);
      --card:rgba(10,26,52,.62);--cardH:rgba(15,37,72,.7);

      --ease:cubic-bezier(.16,1,.3,1)

    *{margin:0;padding:0;box-sizing:border-box}

    body{
      font-family:'Inter',sans-serif;color:var(--t1);
      min-height:100vh;-webkit-font-smoothing:antialiased;
      background-color:#040e1c;
      background-image:
        radial-gradient(ellipse 70% 60% at 6% 0%,rgba(12,36,97,.65) 0%,transparent 58%),
        radial-gradient(ellipse 55% 50% at 94% 100%,rgba(6,182,212,.22) 0%,transparent 54%),
        radial-gradient(ellipse 40% 40% at 80% 20%,rgba(99,102,241,.1) 0%,transparent 52%);
      background-attachment:fixed;
    }
    /* Grid overlay */
    body::before{
      content:'';position:fixed;inset:0;pointer-events:none;
      background-image:
        linear-gradient(rgba(59,130,246,.04) 1px,transparent 1px),
        linear-gradient(90deg,rgba(59,130,246,.04) 1px,transparent 1px);
      background-size:64px 64px;
      z-index:0;
    }

    .mono{font-family:'JetBrains Mono',monospace}

    /* Glass cards — same language as login */
    .card{
      background:rgba(10,26,52,.58);
      backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
      border:1px solid rgba(59,130,246,.16);
      border-radius:16px;padding:20px 24px;
      transition:all .22s var(--ease);position:relative;overflow:hidden;
    }
    .card:hover{
      border-color:rgba(59,130,246,.34);transform:translateY(-2px);
      box-shadow:0 16px 48px rgba(0,0,0,.45),0 0 0 1px rgba(59,130,246,.14)
    }
    .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:9999px;font-size:11px;font-weight:600;letter-spacing:.02em}

    /* Sidebar nav — white-on-blue palette */
    .slink{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:500;color:rgba(255,255,255,.62);cursor:pointer;transition:all .2s var(--ease);border:1px solid transparent}
    .slink:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.92)}
    .slink.on{background:rgba(255,255,255,.16);color:#fff;border-color:rgba(255,255,255,.22);box-shadow:0 2px 18px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.18);backdrop-filter:blur(8px)}

    .trow{transition:background .12s}.trow:hover{background:rgba(59,130,246,.06)}
    .skel{background:linear-gradient(90deg,rgba(10,26,52,.6) 25%,rgba(15,37,72,.75) 50%,rgba(10,26,52,.6) 75%);background-size:200% 100%;animation:sh 1.8s ease-in-out infinite;border-radius:8px;height:16px;margin-bottom:8px}
    @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .fi{animation:fi .32s var(--ease) both}@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .fbar{transition:width .6s cubic-bezier(.25,.46,.45,.94);border-radius:6px;height:100%;display:flex;align-items:center;padding-left:8px}

    /* Gradient buttons */
    .btn{background:linear-gradient(135deg,#3B82F6 0%,#1D4ED8 100%);color:#fff;padding:8px 18px;border-radius:9px;font-weight:600;font-size:13px;border:none;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s var(--ease);box-shadow:0 2px 14px rgba(59,130,246,.3);position:relative;overflow:hidden}
    .btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.12) 0%,transparent 55%);pointer-events:none}
    .btn:hover{background:linear-gradient(135deg,#60A5FA 0%,#2563EB 100%);box-shadow:0 4px 22px rgba(59,130,246,.5);transform:translateY(-1px)}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
    .btnR{background:linear-gradient(135deg,#F43F5E 0%,#BE123C 100%);font-size:11px;padding:4px 10px;border-radius:6px;color:#fff;border:none;cursor:pointer;font-weight:600;font-family:'Inter',sans-serif;transition:all .15s;box-shadow:0 1px 8px rgba(244,63,94,.28)}
    .btnR:hover{transform:translateY(-1px);box-shadow:0 3px 16px rgba(244,63,94,.48)}
    .btnG{background:linear-gradient(135deg,#34D399 0%,#059669 100%);font-size:11px;padding:4px 10px;border-radius:6px;color:#fff;border:none;cursor:pointer;font-weight:600;font-family:'Inter',sans-serif;transition:all .15s;box-shadow:0 1px 8px rgba(52,211,153,.28)}

    .btnAmber{background:linear-gradient(135deg,#FBBF24 0%,#D97706 100%);font-size:11px;padding:4px 10px;border-radius:6px;color:#000;border:none;cursor:pointer;font-weight:600;font-family:'Inter',sans-serif;transition:all .15s}

    input,select,textarea{background:rgba(255,255,255,.05);border:1.5px solid rgba(59,130,246,.16);color:var(--t1);padding:10px 14px;border-radius:9px;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:all .2s}

    th{padding:12px 16px;text-align:left;color:var(--t3);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.09em;border-bottom:1px solid rgba(59,130,246,.14);background:rgba(59,130,246,.05)}
    td{padding:12px 16px;border-bottom:1px solid rgba(59,130,246,.08)}

    /* Gradient titles — same gradient as login brand */
    .mn h2{background:linear-gradient(135deg,#EEF4FF 0%,#93C5FD 60%,#67E8F9 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .rt h2{font-size:18px;font-weight:700;color:var(--accent);margin:16px 0 8px}
    .rt h3{font-size:16px;font-weight:600;margin:12px 0 6px}

    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(59,130,246,.25);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:rgba(59,130,246,.48)}
    .insight{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
    .ins-s{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.18);color:#6EE7B7}.ins-w{background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.18);color:#FDA4AF}.ins-n{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.18);color:#FDE68A}
    .pulse{animation:pulse 2.5s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    /* Glass modal */
    .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(2,8,20,.86);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}

    .tab-bar{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid rgba(59,130,246,.14);padding-bottom:8px;flex-wrap:wrap}
    .tab-btn{padding:8px 16px;border-radius:8px 8px 0 0;font-size:13px;font-weight:500;color:var(--t3);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;font-family:'Inter',sans-serif;transition:all .15s var(--ease)}
    .tab-btn:hover{color:var(--t1)}.tab-btn.active{color:#93C5FD;background:rgba(59,130,246,.09);border-bottom-color:var(--accent)}

    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
    .form-row label{display:block;font-size:11px;color:var(--t3);margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
    .form-row input,.form-row select,.form-row textarea{width:100%}
    .task-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:9px;font-size:10px;font-weight:700;background:linear-gradient(135deg,#F43F5E,#BE123C);color:#fff;padding:0 5px;margin-left:6px;box-shadow:0 1px 8px rgba(244,63,94,.4)}
    .kpi-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:10px}
    .kpi-value{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:700;letter-spacing:-.03em}
    .spotlight{display:none}/* substituído pelos orbs do body */

    @media(max-width:768px){.appl{flex-direction:column!important}.side{width:100%!important;flex-direction:row!important;padding:10px!important;overflow-x:auto;border-right:none!important;border-bottom:1px solid rgba(255,255,255,.1)!important}.side nav{flex-direction:row!important}.sbr,.sft{display:none!important}.mn{padding:16px!important}.gm{grid-template-columns:1fr 1fr!important}.form-row{grid-template-columns:1fr!important}.modal-content{padding:16px}.kpi-value{font-size:22px}}
  </style>

// Supabase client para refresh de token
var SUPABASE_URL='https://edamtnxcwuuydwwbimvz.supabase.co';
var SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkYW10bnhjd3V1eWR3d2JpbXZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA0NDI2MzksImV4cCI6MjA4NjAxODYzOX0.uzu52-qEHatsBoQBJj145wDROcbuYSNFbSzgWDrqUeg';
var sbClient=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

// Auth helpers — usa sessão gerenciada pelo Supabase client
var _currentToken=null;

// Listener de auth state — mantém token atualizado automaticamente
sbClient.auth.onAuthStateChange(function(event,session){
  if(session&&session.access_token){
    _currentToken=session.access_token;
  }else{
    _currentToken=null;
  }
});

function getToken(){return _currentToken}

function logout(){
  _currentToken=null;
  sbClient.auth.signOut();
  window.location.href='/crm/login.html';
}

// Inicializa token a partir da sessão persistida pelo Supabase client
async function initToken(){
  var{data,error}=await sbClient.auth.getSession();
  if(error||!data.session){return null}
  _currentToken=data.session.access_token;
  return _currentToken;
}

// Refresh token via Supabase client
async function refreshToken(){
  try{
    var{data,error}=await sbClient.auth.refreshSession();
    if(error||!data.session)return null;
    _currentToken=data.session.access_token;
    return _currentToken;
  }catch(e){return null}
}

// Fetch com auth
// BUG-12 fix: se token ausente, redireciona para login em vez de retornar null silenciosamente
function q(p,o){
  var token=getToken();
  if(!token){
    // Tentar refresh antes de redirecionar
    return refreshToken().then(function(newToken){
      if(!newToken){window.location.href='/crm/login.html';return null;}
      return q(p,o); // retry com novo token
    }).catch(function(){window.location.href='/crm/login.html';return null;});
  }
  var opts=o||{};
  opts.headers=Object.assign({'Authorization':'Bearer '+token,'Content-Type':'application/json'},opts.headers||{});
  return fetch(API+p,opts).then(function(r){
    if(r.status===401){
      // Tentar refresh antes de desistir
      return refreshToken().then(function(newToken){
        if(!newToken){logout();return null}
        opts.headers['Authorization']='Bearer '+newToken;
        return fetch(API+p,opts).then(function(r2){
          if(r2.status===401||r2.status===403){logout();return null}
          return r2.json();
        }).catch(function(){return null});
      });
    }
    if(r.status===403){
      // 403 = usuário autenticado mas sem vínculo com clínica
      return r.json().then(function(body){
        console.error('[CRM] 403 em '+p+':',body.error||'acesso negado');
        return null;
      });
    }
    return r.json();
  }).catch(function(){return null});
}

function fd(d){if(!d)return'\u2014';try{if(/^\d{4}-\d{2}-\d{2}$/.test(d)){var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}return new Date(d).toLocaleDateString('pt-BR')}catch(e){return d}}
function fdt(d){if(!d)return'\u2014';try{return new Date(d).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}catch(e){return d}}
function ago(d){if(!d)return'';var m=Math.floor((Date.now()-new Date(d).getTime())/60000);if(m<60)return m+'min';var hr=Math.floor(m/60);if(hr<24)return hr+'h';return Math.floor(hr/24)+'d'}
function cur(v){return'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}

/* === F7A: Helpers para humanizar payload e source === */
function formatPayload(et,pl){if(!pl)return'';try{var p=typeof pl==='string'?JSON.parse(pl):pl;switch(et){
case'first_contact':return'Paciente: '+(p.patient_name||'\u2014')+' | Tel: '+(p.phone||'\u2014');
case'booking_created':var pts=[];if(p.appointment_date)pts.push('Data: '+fd(p.appointment_date));if(p.price)pts.push('Valor: R$ '+p.price);if(p.doctor_name)pts.push('M\u00e9dico: '+p.doctor_name);return pts.join(' | ')||'Agendamento criado';
case'booking_canceled':return'Motivo: '+(p.reason||p.cancellation_reason||'\u2014')+' | Por: '+(({'dashboard':'painel','system':'sistema','whatsapp':'WhatsApp'})[p.cancelled_by]||p.cancelled_by||'\u2014');
case'booking_confirmed':return'Consulta confirmada';case'appointment_completed':return'Consulta realizada';
case'no_show':return'Paciente n\u00e3o compareceu';case'conversation_ended':return'Conversa encerrada';
default:var entries=Object.entries(p).filter(function(e){return['backfill','backfill_reason','auto','doctor_id','service_id','source_event_id','appointment_id','clinic_id','patient_id'].indexOf(e[0])<0&&e[1]!==null&&e[1]!==''});if(entries.length===0)return'';return entries.map(function(e){var k=e[0].replace(/_/g,' ');return k.charAt(0).toUpperCase()+k.slice(1)+': '+e[1]}).join(' | ')}}catch(x){return''}}

function fmtSrc(s){if(!s)return'via sistema';var m={'backfill_f6':'sincroniza\u00e7\u00e3o','system':'sistema','whatsapp':'WhatsApp','dashboard':'painel','crm_service':'sistema','agent':'WhatsApp'};return'via '+(m[s]||'sistema')}

var SL={first_contact:'Primeiro Contato',in_triage:'Em Triagem',booking_requested:'Agend. Solicitado',booked:'Agendado',attended:'Atendido',no_show:'N\u00e3o Compareceu',follow_up:'Acompanhamento',reactivation:'Reativa\u00e7\u00e3o',returning:'Recorrente'};

var EI={first_contact:'\uD83D\uDC4B',booking_created:'\u2705',booking_confirmed:'\u2714',booking_canceled:'\u274C',appointment_completed:'\uD83C\uDFE5',no_show:'\u26A0',follow_up_created:'\uD83D\uDCDE',conversation_ended:'\uD83D\uDCAC',info_requested:'\u2753',triage_started:'\uD83D\uDD0D',intent_detected:'\uD83C\uDFAF',reactivation_started:'\uD83D\uDD04',returning_patient_detected:'\uD83D\uDD01',note_added:'\uD83D\uDCDD',tag_added:'\uD83C\uDFF7',stage_override:'\uD83D\uDD00',follow_up_completed:'\u2705'};

// BUG-01 fix: ref pattern — fn(false)=carga inicial/filtro, fn(true)=background poll
// busKey: registra no bus de eventos para receber triggers do Supabase Realtime
function useRefresh(fn,ms,busKey){
  var ref=ur(fn);
  ue(function(){ref.current=fn;});
  ue(function(){
    ref.current(false); // carga inicial — componente pode exibir spinner se quiser
    var iv=setInterval(function(){ref.current(true);},ms||15000); // polls = background silencioso
    if(busKey)busOn(busKey,function(){ref.current(true);}); // realtime → refresh imediato
    return function(){clearInterval(iv);if(busKey)busOff(busKey);};
  },[]);
}

/* === Bus de eventos: realtime → refresh imediato de componentes === */
var _chartInstances={};
var _bus={};
function busOn(k,fn){_bus[k]=fn;}
function busOff(k){delete _bus[k];}
function busEmit(k){try{if(_bus[k])_bus[k]();}catch(e){}}

/* === SWR Cache: mostra dados em cache instantaneamente, busca fresh em background === */
var _swr={};
function swrGet(k){return _swr[k]!==undefined?_swr[k]:null;}
function swrSet(k,v){_swr[k]=v;}
// Compara dois valores — só atualiza state se realmente mudou (evita re-render desnecessário)
function swrDiff(setter,newVal){
  setter(function(old){
    if(old===newVal)return old;
    try{if(JSON.stringify(old)===JSON.stringify(newVal))return old;}catch(e){}
    return newVal;
  });
}

      if(ds.backgroundColor!==undefined)_chartInstances[id].data.datasets[i].backgroundColor=ds.backgroundColor;
    });

/* ===== HELPER: SCORE LABEL SEMÂNTICO (Lead Scoring V2) ===== */
function getScoreLabel(score){
  if(score>=70)return{label:'QUENTE',emoji:'\uD83D\uDD25',color:'#E74C3C',bg:'rgba(231,76,60,0.15)'};
  if(score>=40)return{label:'MORNO',emoji:'\uD83D\uDFE1',color:'#F39C12',bg:'rgba(243,156,18,0.15)'};
  if(score>=15)return{label:'FRIO',emoji:'\u2744\uFE0F',color:'#3498DB',bg:'rgba(52,152,219,0.15)'};
  return{label:'INATIVO',emoji:'\uD83D\uDC80',color:'#7F8C8D',bg:'rgba(127,140,141,0.15)'};
}

  ue(function(){
    initToken().then(function(token){
      if(!token){
        window.location.href='/crm/login.html';
        return;
      }
      q('/me').then(function(d){
        if(!d||!d.clinicId){
          sU({error: (d&&d.error)||'Erro ao carregar dados do usu\u00e1rio'});
          sReady(true);
          return;
        }
        sU(d);sReady(true);
      });
    });
  },[]);

  // Load task summary for badge — atualiza via bus quando tasks mudam
  ue(function(){
    if(!ready)return;
    function loadTS(){q('/tasks/summary').then(function(d){if(d)sTS(d)})}
    loadTS();var iv=setInterval(loadTS,15000);
    busOn('tasks-badge',loadTS);
    return function(){clearInterval(iv);busOff('tasks-badge');};
  },[ready]);

  // F9F: Load notifications — atualiza via bus quando eventos CRM chegam
  ue(function(){
    if(!ready)return;
    function loadNotif(){q('/notifications').then(function(d){if(d)sNotif(d)})}
    loadNotif();var iv2=setInterval(loadNotif,30000);
    busOn('notifications',loadNotif);
    return function(){clearInterval(iv2);busOff('notifications');};

    var cid=user.clinicId;
    var ch=sbClient.channel('crm-rt-'+cid)

        function(){busEmit('agenda');busEmit('overview');busEmit('notifications');})

        function(){busEmit('tasks');busEmit('tasks-badge');busEmit('overview');})
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'crm_events',filter:'clinic_id=eq.'+cid},
        function(){busEmit('notifications');busEmit('overview');})
      .subscribe(function(s){
        if(s==='SUBSCRIBED')console.log('[RT] Realtime conectado — atualizações instantâneas ativas');
        else if(s==='CHANNEL_ERROR'||s==='TIMED_OUT')console.warn('[RT] Realtime indisponível — polling ativo como fallback');
      });
    return function(){sbClient.removeChannel(ch);};
